<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>between & together</title>
<meta name="theme-color" content="#0A0A12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0A0A12;
    --bg-soft: #14141F;
    --bg-card: #1A1A28;
    --bg-card-hover: #20202F;
    --text: #F5F0E5;
    --text-soft: #9994A0;
    --text-faint: #5A5563;
    --mint: #7FFFC4;
    --mint-soft: #5BE3A8;
    --mint-deep: #2EA876;
    --mint-glow: rgba(127, 255, 196, 0.25);
    --warn: #FF6B6B;
  }

  html, body { height: 100%; overflow-x: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Bricolage Grotesque', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* atmospherics */
  .glow {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    filter: blur(80px);
  }
  .glow-1 {
    width: 500px; height: 500px;
    top: 30%; left: 50%;
    transform: translate(-50%, -50%);
    background: var(--mint);
    opacity: 0.08;
    animation: glowPulse 8s ease-in-out infinite;
  }
  .glow-2 {
    width: 300px; height: 300px;
    bottom: -100px; left: -100px;
    background: var(--mint);
    opacity: 0.05;
    animation: glowPulse2 12s ease-in-out infinite reverse;
  }
  @keyframes glowPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.15); }
  }
  @keyframes glowPulse2 {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
  .particle {
    position: absolute;
    background: var(--mint);
    border-radius: 50%;
    opacity: 0.4;
  }
  @keyframes floatParticle {
    0% { transform: translate(0, 0); }
    25% { transform: translate(20px, -30px); }
    50% { transform: translate(-15px, -60px); }
    75% { transform: translate(25px, -40px); }
    100% { transform: translate(0, 0); }
  }

  /* cursor companion */
  .cursor-dot, .cursor-ring {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
  }
  .cursor-dot {
    width: 6px; height: 6px;
    background: var(--mint);
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px var(--mint);
  }
  .cursor-ring {
    width: 36px; height: 36px;
    border: 1.5px solid var(--mint);
    transform: translate(-50%, -50%);
    transition: width 0.3s, height 0.3s, background 0.2s;
  }
  .cursor-ring.hover {
    width: 68px; height: 68px;
    background: var(--mint-glow);
  }
  @media (hover: none) {
    .cursor-dot, .cursor-ring { display: none; }
  }

  /* screens */
  .screen {
    display: none;
    position: relative;
    z-index: 10;
    min-height: 100vh;
    min-height: 100dvh;
    flex-direction: column;
    padding: 24px 22px;
    max-width: 520px;
    margin: 0 auto;
  }
  .screen.active { display: flex; }

  /* HEADER */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .wordmark {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-soft);
    cursor: pointer;
    user-select: none;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.3s;
  }
  .wordmark:hover { color: var(--mint); }
  .wordmark.spin { transform: rotate(360deg); }

  /* HOME */
  .home-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 0;
    gap: 60px;
  }
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .hero-word {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    font-size: clamp(46px, 13vw, 68px);
    line-height: 1;
    letter-spacing: -0.045em;
    color: var(--text);
    opacity: 0;
  }
  .hero-between { animation: heroIn 0.9s 0.2s forwards cubic-bezier(0.16, 1, 0.3, 1); }
  .hero-together { animation: heroIn 0.9s 0.6s forwards cubic-bezier(0.16, 1, 0.3, 1); }
  .hero-amp {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: clamp(130px, 36vw, 190px);
    line-height: 0.85;
    color: var(--mint);
    margin: -14px 0;
    cursor: pointer;
    user-select: none;
    text-shadow: 0 0 60px var(--mint-glow);
    opacity: 0;
    will-change: transform;
    animation: ampIn 1.2s 0.4s forwards cubic-bezier(0.34, 1.56, 0.64, 1),
               ampBreathe 5s 1.6s infinite ease-in-out;
    transform-origin: center;
  }
  @keyframes heroIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes ampIn {
    from { opacity: 0; transform: scale(0.3) rotate(-180deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
  }
  @keyframes ampBreathe {
    0%, 100% { transform: scale(1) rotate(0); }
    50% { transform: scale(1.06) rotate(-3deg); }
  }

  .actions {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    opacity: 0;
    animation: fadeUp 1s 1.1s forwards;
  }

  .btn-primary {
    width: 100%;
    background: var(--mint);
    color: var(--bg);
    border: none;
    padding: 22px 28px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
    border-radius: 20px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.15s;
    box-shadow: 0 6px 0 var(--mint-deep), 0 0 40px var(--mint-glow);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-primary:hover { background: var(--mint-soft); }
  .btn-primary:active {
    transform: translateY(5px);
    box-shadow: 0 1px 0 var(--mint-deep), 0 0 20px var(--mint-glow);
  }
  .btn-primary:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
  }
  .btn-primary .arrow {
    display: inline-block;
    transition: transform 0.25s ease;
    font-size: 22px;
  }
  .btn-primary:hover .arrow { transform: translateX(6px); }

  .btn-ghost {
    background: transparent;
    color: var(--text-soft);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 14px 22px;
    border-radius: 14px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost:hover {
    background: var(--bg-card);
    color: var(--text);
    border-color: rgba(255,255,255,0.2);
  }

  .divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--text-faint);
    opacity: 0.3;
  }

  .code-slots { display: flex; gap: 10px; width: 100%; justify-content: center; }
  .code-slot {
    flex: 1;
    max-width: 72px;
    height: 76px;
    background: var(--bg-card);
    border: 2px solid transparent;
    border-radius: 18px;
    font-family: 'Geist Mono', monospace;
    font-size: 32px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    text-transform: uppercase;
    outline: none;
    transition: all 0.2s;
  }
  .code-slot:focus {
    border-color: var(--mint);
    background: var(--bg-soft);
    transform: translateY(-3px);
    box-shadow: 0 0 24px var(--mint-glow);
  }
  .code-slot.filled {
    border-color: var(--mint);
    background: var(--bg-soft);
    color: var(--mint);
  }

  /* NAME prompt screen */
  .name-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 32px;
  }
  .name-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: clamp(36px, 9vw, 54px);
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .name-title .mint { color: var(--mint); }
  .name-sub {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-soft);
  }
  .name-input {
    width: 100%;
    background: var(--bg-card);
    border: 2px solid transparent;
    border-radius: 18px;
    padding: 22px 24px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    outline: none;
    transition: all 0.2s;
  }
  .name-input::placeholder { color: var(--text-faint); }
  .name-input:focus {
    border-color: var(--mint);
    background: var(--bg-soft);
    box-shadow: 0 0 24px var(--mint-glow);
  }

  /* ROOM screen */
  .room-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }
  .room-code-tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-card);
    padding: 10px 16px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .room-code-tag:hover { background: var(--bg-card-hover); border-color: var(--mint); }
  .room-code-label {
    font-family: 'Geist Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .room-code-value {
    font-family: 'Geist Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--mint);
  }
  .room-code-tag.copied .room-code-value { color: var(--mint); }

  .members {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .member-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-card);
    padding: 8px 14px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .member-chip.self { border-color: rgba(127, 255, 196, 0.3); }
  .member-presence {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-faint);
    flex-shrink: 0;
  }
  .member-presence.online {
    background: var(--mint);
    box-shadow: 0 0 8px var(--mint);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .member-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .member-empty {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 8px 14px;
    border: 1px dashed rgba(255,255,255,0.15);
    border-radius: 100px;
  }

  /* LOBBY */
  .lobby-main { flex: 1; display: flex; flex-direction: column; gap: 24px; padding-top: 12px; }
  .lobby-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: clamp(40px, 11vw, 60px);
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .lobby-title .mint { color: var(--mint); }
  .lobby-waiting {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .lobby-waiting .wait-label {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--mint);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .lobby-waiting .wait-label::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--mint);
    box-shadow: 0 0 8px var(--mint);
    animation: blink 2s ease-in-out infinite;
  }
  .lobby-waiting .wait-line {
    font-size: 17px;
    line-height: 1.45;
    color: var(--text);
  }
  .lobby-waiting .wait-tip {
    font-size: 13px;
    color: var(--text-soft);
    margin-top: 4px;
  }

  .games-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .game-card {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 22px;
    transition: all 0.2s ease;
    text-align: left;
    width: 100%;
    font-family: inherit;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }
  .game-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 100% 0%, var(--mint-glow), transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .game-card.is-disabled {
    opacity: 0.45;
  }

  .game-card-title {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.1;
  }
  .game-card-desc {
    font-size: 14px;
    color: var(--text-soft);
    line-height: 1.4;
  }

  .round-picker {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .round-chip {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.08);
    color: var(--text);
    padding: 14px 6px;
    border-radius: 14px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .round-chip:hover:not(:disabled) {
    background: rgba(127,255,196,0.08);
    border-color: var(--mint);
    color: var(--mint);
    transform: translateY(-2px);
  }
  .round-chip:active:not(:disabled) {
    transform: translateY(0);
  }
  .round-chip:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .round-chip-custom {
    border-style: dashed;
    letter-spacing: 0.02em;
    font-size: 12px;
  }

  /* WYR & TOD shared game header */
  .game-screen { flex: 1; display: flex; flex-direction: column; gap: 20px; padding-top: 4px; }
  .game-meta-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .game-back {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-soft);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 6px 0;
  }
  .game-back:hover { color: var(--mint); }
  .game-round {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  /* WYR */
  .wyr-question {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: clamp(26px, 7vw, 36px);
    font-weight: 500;
    letter-spacing: -0.025em;
    line-height: 1.15;
    text-align: center;
    margin: 24px 0 8px;
    min-height: 86px;
  }
  .wyr-choices {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .wyr-choice {
    background: var(--bg-card);
    border: 2px solid transparent;
    border-radius: 22px;
    padding: 22px 24px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    text-align: left;
    line-height: 1.35;
    cursor: pointer;
    transition: all 0.25s ease;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .wyr-choice:hover { background: var(--bg-card-hover); transform: translateY(-2px); }
  .wyr-choice.you { border-color: var(--mint); background: var(--bg-soft); box-shadow: 0 0 32px var(--mint-glow); }
  .wyr-choice.you-dimmed { opacity: 0.55; }
  .wyr-choice:disabled { cursor: default; }
  .wyr-choice:disabled:hover { transform: none; background: var(--bg-card); }
  .wyr-choice.them { border-color: var(--mint-deep); }
  .wyr-choice.both { border-color: var(--mint); background: var(--bg-soft); }

  .wyr-choice-tags {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    min-height: 18px;
  }
  .pick-tag {
    font-family: 'Geist Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 100px;
    background: rgba(127, 255, 196, 0.15);
    color: var(--mint);
    opacity: 0;
    animation: tagIn 0.4s forwards;
  }
  @keyframes tagIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .wyr-waiting {
    text-align: center;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin: 10px 0;
    min-height: 16px;
  }
  .wyr-waiting .blink-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--mint);
    margin-right: 8px;
    vertical-align: middle;
    animation: blink 1.4s ease-in-out infinite;
  }

  .reveal-banner {
    text-align: center;
    padding: 14px 20px;
    border-radius: 16px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    background: var(--bg-card);
    border: 1px solid rgba(127, 255, 196, 0.3);
    opacity: 0;
    animation: bannerIn 0.5s 0.2s forwards;
  }
  .reveal-banner.match {
    background: rgba(127, 255, 196, 0.12);
    color: var(--mint);
    border-color: var(--mint);
  }
  .reveal-banner.clash {
    color: var(--text);
  }
  @keyframes bannerIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .wyr-next {
    margin-top: 8px;
  }

  /* score chips */
  .scores {
    display: flex;
    gap: 10px;
    margin: 0;
  }
  .score-chip {
    background: var(--bg-card);
    padding: 8px 14px;
    border-radius: 100px;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-soft);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .score-chip .num {
    color: var(--mint);
    font-weight: 500;
  }

  /* TOD */
  .tod-spice {
    display: flex;
    gap: 10px;
    margin: 6px 0 20px;
  }
  .spice-btn {
    flex: 1;
    background: var(--bg-card);
    border: 2px solid transparent;
    border-radius: 16px;
    padding: 16px 12px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-soft);

// ─── State ─────────────────────────────────────────────
const state = {
  user: null,                  // supabase user
  profile: null,               // {id, display_name}
  pendingAction: null,         // {type: 'create'} | {type: 'join', code}
  room: null,                  // {id, code, members: [{user_id, role, display_name}]}
  presence: new Set(),         // set of user_ids currently present
  activeGame: null,            // {id, type, phase, state, version, current_turn_user_id}
  channels: [],                // active realtime channels
  wyrLastChoiceRound: -1       // local guard against multi-tap
};

// ─── Utility ───────────────────────────────────────────
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return Array.from(document.querySelectorAll(sel)); }

function show(screenId) {
  $$('.screen').forEach(s => s.classList.remove('active'));
  $('#' + screenId).classList.add('active');
}

function toast(msg, isErr) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.toggle('err', !!isErr);
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2400);
}

function genCode() {
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ';
  let c = '';
  for (let i = 0; i < 4; i++) c += chars[Math.floor(Math.random() * chars.length)];
  return c;
}

function partnerOf(members) {
  if (!state.user) return null;
  return members.find(m => m.user_id !== state.user.id) || null;
}

function selfOf(members) {
  if (!state.user) return null;
  return members.find(m => m.user_id === state.user.id) || null;
}

const slots = $$('.code-slot');
slots.forEach((slot, i) => {
  slot.addEventListener('input', (e) => {
    let v = e.target.value.toUpperCase().replace(/[^A-Z]/g, '');
    e.target.value = v;
    if (v) {
      slot.classList.add('filled');
      if (i < slots.length - 1) slots[i + 1].focus();
      else if (slots.every(s => s.value)) submitJoinFromSlots();
    } else {
      slot.classList.remove('filled');
    }
  });
  slot.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !slot.value && i > 0) {
      slots[i - 1].focus();
      slots[i - 1].value = '';
      slots[i - 1].classList.remove('filled');
    }
  });
});

function submitJoinFromSlots() {
  const code = slots.map(s => s.value).join('');

// ─── Auth flow ─────────────────────────────────────────
async function startFlow(action) {
  state.pendingAction = action;
  if (action.type === 'join') {
    // pre-check the room exists (capacity is enforced by trigger on insert)
    const { data: room, error } = await sb
      .from('rooms')
      .select('id, code')
      .eq('code', action.code)
      .maybeSingle();
    if (error || !room) {
      toast('no room with that code', true);
      slots.forEach(s => { s.value = ''; s.classList.remove('filled'); });
      slots[0].focus();
      return;
    }
  }

  // ensure auth
  const { data: { user } } = await sb.auth.getUser();
  if (user) {
    state.user = user;
    // check profile
    const { data: prof } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
    if (prof) {
      state.profile = prof;
      proceedAfterAuth();
      return;
    }
  }
  // need to sign in & set name
  goToNameScreen();
}

function goToNameScreen() {
  if (state.pendingAction.type === 'create') {
    $('#nameSub').textContent = 'about to open a room';
  } else {
    $('#nameSub').textContent = `joining ${state.pendingAction.code}`;
  }
  show('screen-name');
  setTimeout(() => $('#nameInput').focus(), 200);
}

$('#nameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') $('#nameContinue').click();
});

$('#nameContinue').addEventListener('click', async () => {
  const name = $('#nameInput').value.trim();
  if (!name) { toast('need a name'); return; }
  const btn = $('#nameContinue');
  btn.disabled = true;
  btn.innerHTML = 'just a sec<span class="arrow">·</span>';

  try {
    let user = state.user;
    if (!user) {
      const { data, error } = await sb.auth.signInAnonymously();
      if (error) throw error;
      user = data.user;
      state.user = user;
    }
    const { data: prof, error: pErr } = await sb
      .from('profiles')
      .upsert({ id: user.id, display_name: name })
      .select('*')
      .single();
    if (pErr) throw pErr;
    state.profile = prof;
    proceedAfterAuth();
  } catch (e) {
    console.error(e);
    toast('something went wrong', true);
    btn.disabled = false;
    btn.innerHTML = 'continue <span class="arrow">→</span>';
  }
});

async function proceedAfterAuth() {
  if (state.pendingAction.type === 'create') {
    await createRoom();
  } else {
    await joinRoom(state.pendingAction.code);
  }
}

// ─── Room create / join ────────────────────────────────
async function createRoom() {
  show('screen-room');
  $('#roomBody').innerHTML = '<div class="loading">opening a room</div>';

  let code, room, attempt = 0;
  while (attempt < 5) {
    code = genCode();
    const { data, error } = await sb
      .from('rooms')
      .insert({ code, created_by: state.user.id })
      .select()
      .single();
    if (!error) { room = data; break; }
    if (error.code !== '23505') {
      console.error(error);
      toast('could not open room', true);
      return goHome();
    }
    attempt++;
  }
  if (!room) { toast('could not open room', true); return goHome(); }

  // add self as host
  const { error: mErr } = await sb
    .from('room_members')
    .insert({ room_id: room.id, user_id: state.user.id, role: 'host' });
  if (mErr) {
    console.error(mErr);
    toast('could not open room', true);
    return goHome();
  }

  window.location.hash = '/r/' + room.code;
  await loadRoom(room.code);
}

async function joinRoom(code) {
  show('screen-room');
  $('#roomBody').innerHTML = '<div class="loading">slipping into the room</div>';

  const { data: room, error } = await sb
    .from('rooms')
    .select('id, code')
    .eq('code', code)
    .maybeSingle();
  if (error || !room) { toast('no room with that code', true); return goHome(); }

  // try insert (idempotent if already a member)
  const { data: existing } = await sb
    .from('room_members')
    .select('user_id')
    .eq('room_id', room.id)
    .eq('user_id', state.user.id)
    .maybeSingle();

  if (!existing) {
    const { error: jErr } = await sb
      .from('room_members')
      .insert({ room_id: room.id, user_id: state.user.id, role: 'guest' });
    if (jErr) {
      console.error(jErr);
      const msg = jErr.message && jErr.message.includes('full') ? 'that room is full' : 'could not join';
      toast(msg, true);
      return goHome();
    }
  }

  window.location.hash = '/r/' + room.code;
  await loadRoom(room.code);
}

async function loadRoom(code) {
  const { data: room, error } = await sb
    .from('rooms')
    .select('id, code, created_by, created_at')
    .eq('code', code)
    .maybeSingle();
  if (error || !room) { toast('that room is gone', true); return goHome(); }

  // load members with profiles
  const { data: members } = await sb
    .from('room_members')
    .select('user_id, role, joined_at')
    .eq('room_id', room.id);

  const ids = (members || []).map(m => m.user_id);
  let profilesMap = {};
  if (ids.length) {
    const { data: profs } = await sb
      .from('profiles')
      .select('id, display_name')
      .in('id', ids);
    (profs || []).forEach(p => { profilesMap[p.id] = p.display_name; });
  }

  state.room = {
    ...room,
    members: (members || []).map(m => ({
      ...m, display_name: profilesMap[m.user_id] || '...'
    }))
  };

  // load active game
  const { data: activeGame } = await sb
    .from('game_sessions')
    .select('*')
    .eq('room_id', room.id)
    .is('ended_at', null)
    .maybeSingle();
  state.activeGame = activeGame || null;

  await unsubscribeAll();
  subscribeRoom();
  startPolling();
  renderRoom();
}

function goHome() {
  state.room = null;
  state.activeGame = null;
  stopPolling();
  teardownFS();
  unsubscribeAll();
  window.location.hash = '';
  // reset slots
  slots.forEach(s => { s.value = ''; s.classList.remove('filled'); });
  show('screen-home');
}

// ─── Sync layer (defense in depth against realtime gaps) ───
let _pollTimer = null;
function startPolling() {
  if (_pollTimer) clearInterval(_pollTimer);
  _pollTimer = setInterval(syncRoomState, 4000);
}
function stopPolling() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
}

async function syncRoomState() {
  if (!state.room) return;
  try {
    // refetch active game
    const { data: game } = await sb
      .from('game_sessions')
      .select('*')
      .eq('room_id', state.room.id)
      .is('ended_at', null)
      .maybeSingle();

    // if a previously-active game has ended or vanished, refetch by id
    if (!game && state.activeGame && !state.activeGame.ended_at) {
      const { data: prev } = await sb
        .from('game_sessions')
        .select('*')
        .eq('id', state.activeGame.id)
        .maybeSingle();
      state.activeGame = prev || null;
      renderRoom();
      return;
    }

    // adopt newer state from DB
    if (game) {
      if (!state.activeGame || game.id !== state.activeGame.id || game.version > state.activeGame.version) {
        state.activeGame = game;
        renderRoom();
      }
      // refresh wyr moves whenever WYR is active
      if (game.game_type === 'wyr') {
        await refreshWyrRound();
      }
    }

    // refetch members (catches missed join/leave events)
    const { data: members } = await sb
      .from('room_members')
      .select('user_id, role, joined_at')
      .eq('room_id', state.room.id);
    if (members) {
      const ids = members.map(m => m.user_id);
      const profMap = {};
      (state.room.members || []).forEach(m => profMap[m.user_id] = m.display_name);
      const missing = ids.filter(id => !profMap[id]);
      if (missing.length) {
        const { data: profs } = await sb
          .from('profiles').select('id, display_name').in('id', missing);
        (profs || []).forEach(p => { profMap[p.id] = p.display_name; });
      }
      const before = JSON.stringify(state.room.members.map(m => m.user_id).sort());
      state.room.members = members.map(m => ({
        ...m, display_name: profMap[m.user_id] || '...'
      }));
      const after = JSON.stringify(ids.sort());
      if (before !== after) renderRoom();
    }
  } catch (e) {
    // silent fail, next tick tries again
    console.debug('sync error', e);
  }
}

// Refetch on visibility change (user comes back to tab/app)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.room) {
    syncRoomState();
  }
});

// Refetch on network reconnect
window.addEventListener('online', () => {
  if (state.room) syncRoomState();
});

// ─── Realtime ──────────────────────────────────────────
async function unsubscribeAll() {
  for (const ch of state.channels) {
    try { await sb.removeChannel(ch); } catch (e) {}
  }
  state.channels = [];
  state.presence = new Set();
}

function subscribeRoom() {
  if (!state.room) return;
  const roomId = state.room.id;

  // room_members changes
  const memCh = sb.channel(`room:${roomId}:members`)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'room_members',
      filter: `room_id=eq.${roomId}`
    }, async () => {
      // refetch members
      const { data: members } = await sb
        .from('room_members').select('user_id, role, joined_at').eq('room_id', roomId);
      const ids = (members || []).map(m => m.user_id);
      let profilesMap = {};
      (state.room.members || []).forEach(m => profilesMap[m.user_id] = m.display_name);
      const missing = ids.filter(id => !profilesMap[id]);
      if (missing.length) {
        const { data: profs } = await sb
          .from('profiles').select('id, display_name').in('id', missing);
        (profs || []).forEach(p => { profilesMap[p.id] = p.display_name; });
      }
      state.room.members = (members || []).map(m => ({
        ...m, display_name: profilesMap[m.user_id] || '...'
      }));
      renderRoom();
    })
    .subscribe();
  state.channels.push(memCh);

  // game_sessions changes
  const gameCh = sb.channel(`room:${roomId}:games`)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'game_sessions',
      filter: `room_id=eq.${roomId}`
    }, async (payload) => {
      if (payload.eventType === 'DELETE') {
        if (state.activeGame && payload.old.id === state.activeGame.id) {
          state.activeGame = null;
          renderRoom();
        }
        return;
      }
      const row = payload.new;
      if (row.ended_at) {
        if (state.activeGame && state.activeGame.id === row.id) {
          state.activeGame = row;
          renderRoom();
        }
        return;
      }
      // active
      if (!state.activeGame || state.activeGame.version <= row.version) {
        state.activeGame = row;
        renderRoom();
      }
    })
    .subscribe();
  state.channels.push(gameCh);

  // wyr moves changes
  const wyrCh = sb.channel(`room:${roomId}:wyr`)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'wyr_moves'
    }, async (payload) => {
      if (!state.activeGame || state.activeGame.game_type !== 'wyr') return;
      if (payload.new.game_id !== state.activeGame.id) return;
      // refetch moves for current round
      await refreshWyrRound();
    })
    .subscribe();
  state.channels.push(wyrCh);

  // presence
  const presCh = sb.channel(`room:${roomId}:presence`, { config: { presence: { key: state.user.id } } });
  presCh
    .on('presence', { event: 'sync' }, () => {
      const pres = presCh.presenceState();
      state.presence = new Set(Object.keys(pres));
      renderRoom();
    })
    .subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await presCh.track({ online_at: new Date().toISOString() });
      }
    });
  state.channels.push(presCh);
}

// ─── Rendering ─────────────────────────────────────────
function renderRoom() {
  if (!state.room) return;
  $('#codeValue').textContent = state.room.code;

  // members chips
  const memEl = $('#members');
  memEl.innerHTML = '';
  const me = selfOf(state.room.members);
  const partner = partnerOf(state.room.members);
  if (me) {
    const chip = document.createElement('button');
    chip.className = 'member-chip self editable';
    chip.type = 'button';
    chip.title = 'tap to change name';
    chip.innerHTML = `<span class="member-presence online"></span><span class="member-name">${escapeHtml(me.display_name)}</span><span class="member-edit-hint">✎</span>`;
    chip.addEventListener('click', () => openNameEditor());
    memEl.appendChild(chip);
  }
  if (partner) {
    const online = state.presence.has(partner.user_id);
    const chip = document.createElement('div');
    chip.className = 'member-chip';
    chip.innerHTML = `<span class="member-presence ${online ? 'online' : ''}"></span><span class="member-name">${escapeHtml(partner.display_name)}</span>`;
    memEl.appendChild(chip);
  } else {
    const empty = document.createElement('div');
    empty.className = 'member-empty';
    empty.textContent = 'waiting';
    memEl.appendChild(empty);
  }

  // body
  if (!state.activeGame || state.activeGame.ended_at) {
    if (state.activeGame && state.activeGame.ended_at) {
      renderEndCard();
    } else {
      renderLobby();
    }
  } else if (state.activeGame.game_type === 'wyr') {
    renderWYR();
  } else if (state.activeGame.game_type === 'tod') {
    renderTOD();
  } else if (state.activeGame.game_type === 'fs') {
    renderFS();
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

    chip.addEventListener('click', () => {
      const g = chip.dataset.game;
      if (chip.dataset.rounds === 'custom') {
        const min = g === 'wyr' ? 2 : 2;
        const max = g === 'wyr' ? 80 : 100;
        const def = g === 'wyr' ? '10' : '10';
        const input = window.prompt(`how many rounds? (${min}–${max})`, def);
        if (!input) return;
        const n = parseInt(input);
        if (isNaN(n) || n < min || n > max) { toast(`enter a number between ${min} and ${max}`, true); return; }
        // ensure even for tod (equal turns)
        const rounds = g === 'tod' && n % 2 !== 0 ? n + 1 : n;
        if (g === 'tod' && rounds !== n) toast(`rounded up to ${rounds} for equal turns`);
        startGame(g, rounds);
      } else {
        const r = parseInt(chip.dataset.rounds);
        startGame(g, r);
      }
    });
  });
}

// ─── Game start ────────────────────────────────────────
async function startGame(type, rounds) {
  const me = selfOf(state.room.members);
  const partner = partnerOf(state.room.members);
  if (!partner) return;

  let initialState;
  let initialPhase;
  let initialTurn = null;

  if (type === 'wyr') {
    const n = rounds || ROUNDS_WYR_DEFAULT;
    const prompts = pickWyrPrompts(n);
    initialState = {
      round: 0,
      prompts,
      total_rounds: n,
      scores: { same: 0, different: 0 },
      history: []
    };
    initialPhase = 'pick';
  } else if (type === 'tod') {
    const n = rounds || ROUNDS_TOD_DEFAULT;
    initialState = {
      spice: null,
      round: 0,
      total_rounds: n,
      picker_id: state.user.id,
      pick: null,
      prompt_idx: null,
      judgment: null,
      used: { easy: { truth: [], dare: [] }, fun: { truth: [], dare: [] }, wild: { truth: [], dare: [] }, spicy: { truth: [], dare: [] } },
      scores: {}
    };
    initialState.scores[me.user_id] = 0;
    initialState.scores[partner.user_id] = 0;
    initialPhase = 'spice';
    initialTurn = state.user.id;
  } else if (type === 'fs') {
    const n = rounds || 1;
    initialState = {
      total_rounds: n,
      match_round: 0,
      scores: {},
      match_winner: null
    };
    initialState.scores[me.user_id] = 0;
    initialState.scores[partner.user_id] = 0;
    initialPhase = 'countdown';
  }

  const { data, error } = await sb
    .from('game_sessions')
    .insert({
      room_id: state.room.id,
      game_type: type,
      phase: initialPhase,
      state: initialState,
      current_turn_user_id: initialTurn
    })
    .select()
    .single();
  if (error) {
    console.error(error);
    toast('could not start the game', true);
    return;
  }
  state.activeGame = data;
  state.wyrLastChoiceRound = -1;
  teardownFS();
  renderRoom();
}

// ─── Cross-game prompt memory (per room, persisted in localStorage) ───
function _promptMemKey(code) { return `bt-prompts-${code}`; }
function getUsedPromptIdxs(code, bucket) {
  try {
    const raw = localStorage.getItem(_promptMemKey(code));
    if (!raw) return [];
    const obj = JSON.parse(raw);
    const path = bucket.split('.');
    let cur = obj;
    for (const k of path) { cur = cur && cur[k]; }
    return Array.isArray(cur) ? cur : [];
  } catch (e) { return []; }
}
function addUsedPromptIdxs(code, bucket, idxs) {
  try {
    const raw = localStorage.getItem(_promptMemKey(code));
    const obj = raw ? JSON.parse(raw) : {};
    const path = bucket.split('.');
    let cur = obj;
    for (let i = 0; i < path.length - 1; i++) {
      if (!cur[path[i]]) cur[path[i]] = {};
      cur = cur[path[i]];
    }
    const last = path[path.length - 1];
    const existing = Array.isArray(cur[last]) ? cur[last] : [];
    const merged = Array.from(new Set([...existing, ...idxs]));
    cur[last] = merged;
    localStorage.setItem(_promptMemKey(code), JSON.stringify(obj));
  } catch (e) {}
}
function pickFreshIdx(poolLen, usedIdxs) {
  const available = [];
  for (let i = 0; i < poolLen; i++) if (!usedIdxs.includes(i)) available.push(i);
  if (available.length === 0) return Math.floor(Math.random() * poolLen);
  return available[Math.floor(Math.random() * available.length)];
}
function pickFreshIdxs(poolLen, n, usedIdxs) {
  let available = [];
  for (let i = 0; i < poolLen; i++) if (!usedIdxs.includes(i)) available.push(i);
  if (available.length < n) {
    // ran out, reset and re-pick from full pool
    available = [];
    for (let i = 0; i < poolLen; i++) available.push(i);
  }
  // shuffle and take n
  available.sort(() => Math.random() - 0.5);
  return available.slice(0, n);
}

function pickN(pool, n) {
  // legacy path (fallback if no room context); still works
  const shuffled = [...pool].map(p => ({ p, r: Math.random() })).sort((a, b) => a.r - b.r).map(x => x.p);
  return shuffled.slice(0, n);
}

function pickWyrPrompts(n) {
  if (!state.room) return pickN(WYR_PROMPTS, n);
  const used = getUsedPromptIdxs(state.room.code, 'wyr');
  const idxs = pickFreshIdxs(WYR_PROMPTS.length, n, used);
  addUsedPromptIdxs(state.room.code, 'wyr', idxs);
  return idxs.map(i => WYR_PROMPTS[i]);
}

// ─── WYR rendering ────────────────────────────────────
async function refreshWyrRound() {
  if (!state.activeGame || state.activeGame.game_type !== 'wyr') return;
  const round = state.activeGame.state.round;
  const { data: moves } = await sb
    .from('wyr_moves')
    .select('user_id, choice, round')
    .eq('game_id', state.activeGame.id)
    .eq('round', round);
  state._wyrMoves = moves || [];

  // if both have moved and we're still in 'pick', attempt to advance to 'reveal'.
  // Both clients may attempt this; only the one whose UPDATE actually mutates
  // a row will update local state. The other receives the change via realtime.
  if (state.activeGame.phase === 'pick' && (moves || []).length >= 2) {
    const newState = JSON.parse(JSON.stringify(state.activeGame.state));
    const a = moves[0], b = moves[1];
    const match = a.choice === b.choice;
    newState.scores = {
      same: (newState.scores.same || 0) + (match ? 1 : 0),
      different: (newState.scores.different || 0) + (match ? 0 : 1)
    };
    newState.history.push({
      prompt: newState.prompts[round],
      choices: { [a.user_id]: a.choice, [b.user_id]: b.choice }
    });
    const { data, error } = await sb
      .from('game_sessions')
      .update({ state: newState, phase: 'reveal' })
      .eq('id', state.activeGame.id)
      .eq('version', state.activeGame.version)
      .eq('phase', 'pick')
      .select();
    if (!error && data && data.length > 0) {
      state.activeGame = data[0];
    }
  }
  renderRoom();
}

function renderWYR() {
  const body = $('#roomBody');
  const g = state.activeGame;
  const round = g.state.round;
  const prompt = g.state.prompts[round];
  const me = selfOf(state.room.members);
  const partner = partnerOf(state.room.members);
  const moves = state._wyrMoves || [];
  const myMove = moves.find(m => m.user_id === me.user_id);
  const theirMove = moves.find(m => m.user_id === (partner && partner.user_id));

  let banner = '';
  let isReveal = g.phase === 'reveal';
  if (isReveal && myMove && theirMove) {
    const match = myMove.choice === theirMove.choice;
    banner = `<div class="reveal-banner ${match ? 'match' : 'clash'}">${match ? '✦ same pick' : 'different pick'}</div>`;
  } else if (isReveal && myMove && !theirMove) {
    banner = `<div class="reveal-banner">they didn't pick yet</div>`;
  }

  const chHtml = prompt.map((opt, idx) => {
    const youPicked = myMove && myMove.choice === idx;
    const theyPicked = theirMove && theirMove.choice === idx;
    let cls = 'wyr-choice';
    if (isReveal) {
      if (youPicked && theyPicked) cls += ' both';
      else if (youPicked) cls += ' you';
      else if (theyPicked) cls += ' them';
    } else if (myMove) {
      cls += youPicked ? ' you' : ' you-dimmed';
    }
    const tags = [];
    if (youPicked) tags.push(`<span class="pick-tag">you</span>`);
    if (theyPicked) tags.push(`<span class="pick-tag">${escapeHtml((partner && partner.display_name) || 'them')}</span>`);
    return `
      <button class="${cls}" data-choice="${idx}" ${myMove || isReveal ? 'disabled' : ''}>
        ${escapeHtml(opt)}
        <div class="wyr-choice-tags">${tags.join('')}</div>
      </button>
    `;
  }).join('');

  let waitMsg = '';
  if (!myMove && !theirMove) waitMsg = 'both still thinking';
  else if (myMove && !theirMove) waitMsg = '<span class="blink-dot"></span>waiting for them';
  else if (!myMove && theirMove) waitMsg = '<span class="blink-dot"></span>they picked. your turn';
  else if (myMove && theirMove && !isReveal) waitMsg = 'revealing';

  const nextBtn = isReveal ? `<button class="btn-primary wyr-next" id="wyrNext">${round + 1 >= g.state.prompts.length ? 'see how it went' : 'next round'} <span class="arrow">→</span></button>` : '';

  body.innerHTML = `
    <div class="game-screen">
      <div class="game-meta-bar">
        <button class="game-back" id="backToLobby">← lobby</button>
        <div class="scores">
          <div class="score-chip">same <span class="num">${g.state.scores.same || 0}</span></div>
          <div class="score-chip">diff <span class="num">${g.state.scores.different || 0}</span></div>
        </div>
        <div class="game-round">${round + 1}/${g.state.prompts.length}</div>
      </div>
      <div class="wyr-question">${escapeHtml(prompt[0])} <span style="color:var(--mint)">or</span> ${escapeHtml(prompt[1])}?</div>
      <div class="wyr-choices">${chHtml}</div>
      ${banner ? banner : `<div class="wyr-waiting">${waitMsg}</div>`}
      ${nextBtn}
    </div>
  `;

  body.querySelectorAll('.wyr-choice').forEach(btn => {
    btn.addEventListener('click', () => makeWyrChoice(parseInt(btn.dataset.choice)));
  });
  if (isReveal) {
    $('#wyrNext').addEventListener('click', advanceWyrRound);
  }
  $('#backToLobby').addEventListener('click', () => confirmEndGame());

  // ensure we have move data
  if (!state._wyrMoves) refreshWyrRound();
}

async function makeWyrChoice(choice) {
  const g = state.activeGame;
  const round = g.state.round;
  if (state.wyrLastChoiceRound === round) return;
  state.wyrLastChoiceRound = round;

  const { error } = await sb
    .from('wyr_moves')
    .insert({ game_id: g.id, user_id: state.user.id, round, choice });
  if (error && error.code !== '23505') {
    console.error(error);
    toast('could not register your pick', true);
    state.wyrLastChoiceRound = -1;
    return;
  }
  await refreshWyrRound();
}

async function advanceWyrRound() {
  const g = state.activeGame;
  const nextRound = g.state.round + 1;
  if (nextRound >= g.state.prompts.length) {
    // end game
    await sb.from('game_sessions')
      .update({ ended_at: new Date().toISOString(), phase: 'ended' })
      .eq('id', g.id);
    return;
  }
  const newState = { ...g.state, round: nextRound };
  const { error } = await sb
    .from('game_sessions')
    .update({ state: newState, phase: 'pick' })
    .eq('id', g.id)
    .eq('version', g.version);
  if (error) console.error(error);
  state._wyrMoves = [];
  state.wyrLastChoiceRound = -1;
}

// ─── TOD rendering ─────────────────────────────────────
function renderTOD() {
  const body = $('#roomBody');

  const phase = g.phase;

  let inner = '';

  const header = `
    <div class="game-meta-bar">
      <button class="game-back" id="backToLobby">← lobby</button>

      </div>

      ${header}

      <div class="tod-spice">
        <button class="spice-btn" data-spice="easy" ${canChoose ? '' : 'disabled'}>easy</button>
        <button class="spice-btn" data-spice="fun" ${canChoose ? '' : 'disabled'}>fun</button>
        <button class="spice-btn" data-spice="wild" ${canChoose ? '' : 'disabled'}>wild</button>
        <button class="spice-btn" data-spice="spicy" ${canChoose ? '' : 'disabled'}>spicy</button>
      </div>
    `;
  } else if (phase === 'pick') {
    const isPicker = g.state.picker_id === state.user.id;
    const pickerName = isPicker ? 'your' : `${(partner && partner.display_name) || 'their'}'s`;
    inner = `
      ${header}
      <div class="tod-turn-banner">
        <div class="who">${isPicker ? "your turn" : `${escapeHtml((partner && partner.display_name) || 'their')}'s turn`}</div>
        <div class="what">${isPicker ? `pick <span class="mint">truth</span> or <span class="mint">dare</span>` : 'they\'re choosing'}</div>
      </div>
      ${isPicker ? `
        <div class="tod-pick">
          <button class="tod-pick-btn" data-pick="truth">truth</button>
          <button class="tod-pick-btn" data-pick="dare">dare</button>
        </div>
      ` : ''}
    `;
  } else if (phase === 'prompt' || phase === 'judge') {

      </div>
      ${isPicker ? `

          <button class="btn-primary" id="todDone">i did it <span class="arrow">→</span></button>
        ` : `

        `}
      ` : `
        ${!judgeReady ? `
          <div class="wyr-waiting"><span class="blink-dot"></span>watching ${escapeHtml((partner && partner.display_name) || 'them')}...</div>
        ` : `
          <div class="tod-judge">
            <button class="judge-btn did" id="judgeDid">they did it</button>
            <button class="judge-btn didnt" id="judgeDidnt">no they didn't</button>
          </div>
        `}
      `}
    `;
  } else if (phase === 'result') {
    const isPicker = g.state.picker_id === state.user.id;
    const did = g.state.judgment === 'did';
    inner = `
      ${header}
      <div class="reveal-banner ${did ? 'match' : 'clash'}">${did ? '✦ point scored' : 'they couldn\'t do it'}</div>
      <button class="btn-primary" id="todNext">${g.state.round + 1 >= (g.state.total_rounds || ROUNDS_TOD_DEFAULT) ? 'see how it went' : 'next round'} <span class="arrow">→</span></button>
    `;

    b.addEventListener('click', () => pickSpice(b.dataset.spice));
  });
  body.querySelectorAll('.tod-pick-btn').forEach(b => {
    b.addEventListener('click', () => pickTOD(b.dataset.pick));
  });
  $('#todDone') && $('#todDone').addEventListener('click', todDone);
  $('#judgeDid') && $('#judgeDid').addEventListener('click', () => judge('did'));
  $('#judgeDidnt') && $('#judgeDidnt').addEventListener('click', () => judge('didnt'));
  $('#todNext') && $('#todNext').addEventListener('click', advanceTodRound);

  // typewriter for prompt
  if (phase === 'prompt' || phase === 'judge') {
    const el = $('#todPromptText');
    const text = TOD_PROMPTS[g.state.spice][g.state.pick][g.state.prompt_idx];
    typeText(el, text);
  }
}

function typeText(el, text) {
  el.textContent = '';
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'typing-cursor';
  el.appendChild(cursor);
  const speed = 28;
  function step() {
    if (i < text.length) {
      const node = document.createTextNode(text[i]);
      el.insertBefore(node, cursor);
      i++;
      setTimeout(step, speed);
    } else {
      // remove cursor after a moment
      setTimeout(() => cursor.remove(), 1200);
    }
  }
  step();
}

async function pickSpice(spice) {
  const g = state.activeGame;
  const partner = partnerOf(state.room.members);
  const newState = { ...g.state, spice };
  await sb.from('game_sessions')
    .update({ state: newState, phase: 'pick' })
    .eq('id', g.id).eq('version', g.version);
}

async function pickTOD(pick) {
  const g = state.activeGame;
  const list = TOD_PROMPTS[g.state.spice][pick];
  const usedInGame = g.state.used[g.state.spice][pick] || [];
  const bucket = `tod.${g.state.spice}.${pick}`;
  const usedAcrossRoom = state.room ? getUsedPromptIdxs(state.room.code, bucket) : [];
  // combine and pick a fresh one
  const allUsed = Array.from(new Set([...usedInGame, ...usedAcrossRoom]));
  const idx = pickFreshIdx(list.length, allUsed);
  // record in both game state (for show-once-per-game) and room memory (cross-game)
  if (state.room) addUsedPromptIdxs(state.room.code, bucket, [idx]);

  const newUsed = JSON.parse(JSON.stringify(g.state.used));
  newUsed[g.state.spice][pick] = [...usedInGame, idx];
  const newState = { ...g.state, pick, prompt_idx: idx, used: newUsed };
  await sb.from('game_sessions')
    .update({ state: newState, phase: 'prompt' })
    .eq('id', g.id).eq('version', g.version);
}

async function todDone() {
  const g = state.activeGame;
  await sb.from('game_sessions')
    .update({ phase: 'judge' })
    .eq('id', g.id).eq('version', g.version);
}

async function judge(verdict) {
  const g = state.activeGame;
  const newState = { ...g.state, judgment: verdict };
  if (verdict === 'did') {
    newState.scores = { ...newState.scores };
    newState.scores[g.state.picker_id] = (newState.scores[g.state.picker_id] || 0) + 1;
  }
  await sb.from('game_sessions')
    .update({ state: newState, phase: 'result' })
    .eq('id', g.id).eq('version', g.version);
}

async function advanceTodRound() {
  const g = state.activeGame;
  const nextRound = g.state.round + 1;
  const total = g.state.total_rounds || ROUNDS_TOD_DEFAULT;
  if (nextRound >= total) {
    await sb.from('game_sessions')
      .update({ ended_at: new Date().toISOString(), phase: 'ended' })
      .eq('id', g.id);
    return;
  }
  const partner = partnerOf(state.room.members);
  // flip picker
  const newState = {
    ...g.state,
    round: nextRound,
    picker_id: g.state.picker_id === state.user.id ? (partner && partner.user_id) : state.user.id,
    pick: null,
    prompt_idx: null,
    judgment: null
  };
  await sb.from('game_sessions')
    .update({ state: newState, phase: 'pick', current_turn_user_id: newState.picker_id })
    .eq('id', g.id).eq('version', g.version);
}

// ─── Finger Smash ──────────────────────────────────────
const FS_BASE_TAP_WEIGHT = 1.8;
const FS_OVERHEAT_LIMIT = 7;
const FS_OVERHEAT_MS = 1200;
const FS_MATCH_MS = 30000;
const FS_BROADCAST_MS = 80;

let _fsCh = null, _fsBroadcastTimer = null, _fsCountdownTimer = null, _fsMatchTimer = null, _fsRoundKey = null;

function resetFSLocal() {
  state.fsLocal = {
    phase: 'countdown',
    countdown: 3,
    myCount: 0,
    opponentCount: 0,
    myTaps: [],
    overheated: false,
    linePos: 50,
    roundWinner: null,
    endedLocally: false
  };
}

function teardownFS() {
  if (_fsCh) { try { sb.removeChannel(_fsCh); } catch(e) {} _fsCh = null; }
  if (_fsBroadcastTimer) { clearInterval(_fsBroadcastTimer); _fsBroadcastTimer = null; }
  if (_fsCountdownTimer) { clearInterval(_fsCountdownTimer); _fsCountdownTimer = null; }
  if (_fsMatchTimer) { clearTimeout(_fsMatchTimer); _fsMatchTimer = null; }
  _fsRoundKey = null;
  state.fsLocal = null;
}

function subscribeFSChannel() {
  if (!state.activeGame || state.activeGame.game_type !== 'fs') return;
  if (_fsCh) { try { sb.removeChannel(_fsCh); } catch(e) {} _fsCh = null; }
  _fsCh = sb.channel(`fs:${state.activeGame.id}`)
    .on('broadcast', { event: 'count' }, ({ payload }) => {
      if (!state.fsLocal || state.fsLocal.phase !== 'playing') return;
      if (payload.user_id === state.user.id) return;
      if (payload.round !== state.activeGame.state.match_round) return;
      state.fsLocal.opponentCount = Math.max(state.fsLocal.opponentCount, payload.count);
      computeFSLine();
      paintFSScreen();
    })
    .on('broadcast', { event: 'won' }, ({ payload }) => {
      if (!state.fsLocal || state.fsLocal.endedLocally) return;
      if (payload.round !== state.activeGame.state.match_round) return;
      state.fsLocal.endedLocally = true;
      state.fsLocal.roundWinner = payload.winner_id;
      state.fsLocal.phase = 'over';
      stopFSTimers();
      hostRecordFSRoundWin(payload.winner_id);
      renderFS();
    })
    .subscribe();
}

function stopFSTimers() {
  if (_fsBroadcastTimer) { clearInterval(_fsBroadcastTimer); _fsBroadcastTimer = null; }
  if (_fsCountdownTimer) { clearInterval(_fsCountdownTimer); _fsCountdownTimer = null; }
  if (_fsMatchTimer) { clearTimeout(_fsMatchTimer); _fsMatchTimer = null; }
}

function computeFSLine() {
  if (!state.fsLocal) return;
  const delta = state.fsLocal.myCount - state.fsLocal.opponentCount;
  state.fsLocal.linePos = Math.max(0, Math.min(100, 50 + delta * FS_BASE_TAP_WEIGHT));
  if (state.fsLocal.phase !== 'playing' || state.fsLocal.endedLocally) return;
  if (state.fsLocal.linePos >= 100) {
    declareFSRoundWinner(state.user.id);
  } else if (state.fsLocal.linePos <= 0) {
    const partner = partnerOf(state.room.members);
    if (partner) declareFSRoundWinner(partner.user_id);
  }
}

function declareFSRoundWinner(winner_id) {
  if (state.fsLocal.endedLocally) return;
  state.fsLocal.endedLocally = true;
  state.fsLocal.roundWinner = winner_id;
  state.fsLocal.phase = 'over';
  stopFSTimers();
  if (_fsCh) {
    _fsCh.send({
      type: 'broadcast',
      event: 'won',
      payload: { winner_id, round: state.activeGame.state.match_round, ts: Date.now() }
    });
  }
  hostRecordFSRoundWin(winner_id);
  renderFS();
}

async function hostRecordFSRoundWin(winner_id) {
  const isHost = state.room && state.room.created_by === state.user.id;
  if (!isHost) return;
  const g = state.activeGame;
  if (g.phase !== 'playing' && g.phase !== 'countdown') return;
  const newState = JSON.parse(JSON.stringify(g.state));
  newState.scores[winner_id] = (newState.scores[winner_id] || 0) + 1;
  const winsNeeded = Math.ceil(newState.total_rounds / 2);
  const matchEnded = newState.scores[winner_id] >= winsNeeded;
  const update = {
    state: newState,
    phase: matchEnded ? 'ended' : 'round_done'
  };
  if (matchEnded) {
    newState.match_winner = winner_id;
    update.ended_at = new Date().toISOString();
  }
  await sb.from('game_sessions')
    .update(update)
    .eq('id', g.id)
    .eq('version', g.version);
}

function onFSTap(e) {
  if (e && e.cancelable) e.preventDefault();
  if (!state.fsLocal || state.fsLocal.phase !== 'playing') return;
  if (state.fsLocal.endedLocally || state.fsLocal.overheated) return;

  const now = Date.now();
  state.fsLocal.myTaps = state.fsLocal.myTaps.filter(t => now - t < 1000);
  state.fsLocal.myTaps.push(now);

  if (state.fsLocal.myTaps.length > FS_OVERHEAT_LIMIT) {
    state.fsLocal.overheated = true;
    paintFSScreen();
    setTimeout(() => {
      if (state.fsLocal) {
        state.fsLocal.overheated = false;
        state.fsLocal.myTaps = [];
        paintFSScreen();
      }
    }, FS_OVERHEAT_MS);
    return;
  }

  state.fsLocal.myCount++;
  computeFSLine();
  paintFSScreen();
}

function startFSBroadcastLoop() {
  if (_fsBroadcastTimer) clearInterval(_fsBroadcastTimer);
  _fsBroadcastTimer = setInterval(() => {
    if (!_fsCh || !state.fsLocal || state.fsLocal.phase !== 'playing') return;
    _fsCh.send({
      type: 'broadcast',
      event: 'count',
      payload: {
        user_id: state.user.id,
        count: state.fsLocal.myCount,
        round: state.activeGame.state.match_round
      }
    });
  }, FS_BROADCAST_MS);
}

function beginFSCountdown() {
  if (!state.fsLocal) resetFSLocal();
  state.fsLocal.phase = 'countdown';
  state.fsLocal.countdown = 3;
  renderFS();
  if (_fsCountdownTimer) clearInterval(_fsCountdownTimer);
  _fsCountdownTimer = setInterval(() => {
    if (!state.fsLocal) { clearInterval(_fsCountdownTimer); _fsCountdownTimer = null; return; }
    state.fsLocal.countdown--;
    if (state.fsLocal.countdown <= 0) {
      clearInterval(_fsCountdownTimer);
      _fsCountdownTimer = null;
      beginFSMatch();
    } else {
      renderFS();
    }
  }, 1000);
}

function beginFSMatch() {
  if (!state.fsLocal) return;
  state.fsLocal.phase = 'playing';
  renderFS();
  startFSBroadcastLoop();
  if (_fsMatchTimer) clearTimeout(_fsMatchTimer);
  _fsMatchTimer = setTimeout(() => {
    if (!state.fsLocal || state.fsLocal.phase !== 'playing' || state.fsLocal.endedLocally) return;
    const partner = partnerOf(state.room.members);
    const winner = state.fsLocal.myCount >= state.fsLocal.opponentCount
      ? state.user.id
      : (partner ? partner.user_id : state.user.id);
    declareFSRoundWinner(winner);
  }, FS_MATCH_MS);
}

function maybeStartFSRound() {
  if (!state.activeGame || state.activeGame.game_type !== 'fs') return;
  if (state.activeGame.phase !== 'countdown' && state.activeGame.phase !== 'playing') return;
  const roundKey = `${state.activeGame.id}:${state.activeGame.state.match_round}`;
  if (_fsRoundKey === roundKey) return; // already started this round locally
  _fsRoundKey = roundKey;
  stopFSTimers();
  resetFSLocal();
  if (!_fsCh) subscribeFSChannel();
  beginFSCountdown();
}

async function advanceFSRound() {
  const g = state.activeGame;
  const newState = JSON.parse(JSON.stringify(g.state));
  newState.match_round = (newState.match_round || 0) + 1;
  await sb.from('game_sessions')
    .update({ state: newState, phase: 'countdown' })
    .eq('id', g.id)
    .eq('version', g.version);
}

function renderFS() {
  const body = $('#roomBody');
  const g = state.activeGame;
  const me = selfOf(state.room.members);
  const partner = partnerOf(state.room.members);
  const myScore = g.state.scores[me.user_id] || 0;
  const theirScore = partner ? (g.state.scores[partner.user_id] || 0) : 0;
  const totalRounds = g.state.total_rounds || 1;
  const roundNum = (g.state.match_round || 0) + 1;
  const showHeader = g.phase === 'round_done';

  // round-done summary view
  if (g.phase === 'round_done') {
    const lastWinner = state.fsLocal && state.fsLocal.roundWinner;
    const winnerName = lastWinner === me.user_id ? 'you' : (partner ? partner.display_name : 'they');
    body.innerHTML = `
      <div class="game-screen">
        <div class="game-meta-bar">
          <button class="game-back" id="backToLobby">← lobby</button>
          <div class="scores">
            <div class="score-chip">${escapeHtml(me.display_name.slice(0,8))} <span class="num">${myScore}</span></div>
            <div class="score-chip">${escapeHtml((partner && partner.display_name) ? partner.display_name.slice(0,8) : '–')} <span class="num">${theirScore}</span></div>
          </div>
          <div class="game-round">${roundNum}/${totalRounds}</div>
        </div>
        <div class="end-card">
          <div class="end-headline">${escapeHtml(winnerName)} took<br><span class="mint">that round</span></div>
          <div class="end-stat">match is at <span class="num">${myScore}</span> – <span class="num">${theirScore}</span></div>
          <div class="end-actions">
            <button class="btn-primary" id="fsNext">next round <span class="arrow">→</span></button>
          </div>
        </div>
      </div>
    `;
    $('#backToLobby').addEventListener('click', () => confirmEndGame());
    $('#fsNext').addEventListener('click', advanceFSRound);
    return;
  }

  // playing / countdown
  if (!state.fsLocal) maybeStartFSRound();

  body.innerHTML = `
    <div class="fs-wrap" id="fsWrap">
      <div class="fs-top">
        <button class="game-back" id="backToLobby">← lobby</button>
        <div class="fs-round-pill">round ${roundNum}/${totalRounds}</div>
      </div>
      <div class="fs-counters">
        <div class="fs-counter fs-counter-me">
          <div class="fs-counter-label">you</div>
          <div class="fs-counter-num" id="fsMyCount">0</div>
        </div>
        <div class="fs-counter fs-counter-them">
          <div class="fs-counter-label">${escapeHtml((partner && partner.display_name.slice(0,10)) || 'them')}</div>
          <div class="fs-counter-num" id="fsTheirCount">0</div>
        </div>
      </div>
      <div class="fs-tap-area" id="fsTapArea">
        <div class="fs-bar-track">
          <div class="fs-bar-fill" id="fsBarFill"></div>
          <div class="fs-bar-line" id="fsBarLine"></div>
        </div>
        <div class="fs-tap-hint" id="fsTapHint">tap anywhere</div>
        <div class="fs-overheat" id="fsOverheat">overheated</div>
        <div class="fs-countdown" id="fsCountdown"></div>
      </div>
    </div>
  `;
  $('#backToLobby').addEventListener('click', () => confirmEndGame());
  const tapArea = $('#fsTapArea');
  tapArea.addEventListener('touchstart', onFSTap, { passive: false });
  tapArea.addEventListener('mousedown', onFSTap);
  paintFSScreen();
}

function paintFSScreen() {
  if (!state.fsLocal) return;
  const my = $('#fsMyCount');
  const their = $('#fsTheirCount');
  const fill = $('#fsBarFill');
  const line = $('#fsBarLine');
  const hint = $('#fsTapHint');
  const overheat = $('#fsOverheat');
  const countdown = $('#fsCountdown');
  if (!my) return;

  my.textContent = state.fsLocal.myCount;
  their.textContent = state.fsLocal.opponentCount;
  fill.style.height = state.fsLocal.linePos + '%';
  line.style.bottom = state.fsLocal.linePos + '%';

  if (state.fsLocal.phase === 'countdown') {
    countdown.style.display = 'flex';
    countdown.textContent = state.fsLocal.countdown > 0 ? state.fsLocal.countdown : 'go';
    hint.style.display = 'none';
    overheat.style.display = 'none';
  } else if (state.fsLocal.phase === 'playing') {
    countdown.style.display = 'none';
    hint.style.display = state.fsLocal.myCount === 0 ? 'block' : 'none';
    overheat.style.display = state.fsLocal.overheated ? 'flex' : 'none';
  } else if (state.fsLocal.phase === 'over') {
    countdown.style.display = 'none';
    hint.style.display = 'none';
    overheat.style.display = 'none';
  }
}


function renderEndCard() {
  const body = $('#roomBody');
  const g = state.activeGame;
  const me = selfOf(state.room.members);
  const partner = partnerOf(state.room.members);

  let statHtml = '';
  let headline = '';

  if (g.game_type === 'wyr') {
    const s = g.state.scores.same || 0;
    const d = g.state.scores.different || 0;
    headline = s > d ? `mostly<br><span class="mint">same page</span>` : d > s ? `mostly<br><span class="mint">different</span>` : `<span class="mint">balanced</span>`;
    statHtml = `
      <div class="end-stat">same <span class="num">${s}</span></div>
      <div class="end-stat">different <span class="num">${d}</span></div>
    `;
  } else if (g.game_type === 'fs') {
    const myScore = g.state.scores[me.user_id] || 0;
    const theirScore = (partner && g.state.scores[partner.user_id]) || 0;
    const iWon = g.state.match_winner === me.user_id;
    const theyWon = partner && g.state.match_winner === partner.user_id;
    headline = iWon
      ? `<span class="mint">you</span><br>smashed it`
      : theyWon
        ? `<span class="mint">${escapeHtml((partner && partner.display_name.slice(0,12)) || 'they')}</span><br>got the win`
        : `<span class="mint">match over</span>`;
    statHtml = `
      <div class="end-stat">${escapeHtml(me.display_name)} <span class="num">${myScore}</span></div>
      <div class="end-stat">${escapeHtml((partner && partner.display_name) || '–')} <span class="num">${theirScore}</span></div>
    `;
  } else {
    const myScore = g.state.scores[me.user_id] || 0;
    const theirScore = (partner && g.state.scores[partner.user_id]) || 0;
    headline = myScore > theirScore
      ? `<span class="mint">you</span><br>showed up`
      : theirScore > myScore
        ? `<span class="mint">${escapeHtml((partner && partner.display_name.slice(0,12)) || 'they')}</span><br>showed up`
        : `<span class="mint">tied</span>`;
    statHtml = `
      <div class="end-stat">${escapeHtml(me.display_name)} <span class="num">${myScore}</span></div>
      <div class="end-stat">${escapeHtml((partner && partner.display_name) || '–')} <span class="num">${theirScore}</span></div>
    `;
  }

  body.innerHTML = `
    <div class="game-screen">
      <div class="end-card">
        <div class="end-headline">${headline}</div>
        ${statHtml}
        <div class="end-actions">
          <button class="btn-primary" id="playAgain">play again <span class="arrow">→</span></button>
          <button class="btn-ghost" id="backLobby">back to lobby</button>
        </div>
      </div>
    </div>
  `;
  $('#playAgain').addEventListener('click', () => {
    teardownFS();
    const defaults = { wyr: ROUNDS_WYR_DEFAULT, tod: ROUNDS_TOD_DEFAULT, fs: 1 };
    startGame(g.game_type, g.state.total_rounds || defaults[g.game_type]);
  });
  $('#backLobby').addEventListener('click', () => {
    teardownFS();
    state.activeGame = null;
    renderRoom();
  });
}

async function confirmEndGame() {
  if (!confirm('leave this game? progress will be lost.')) return;
  const g = state.activeGame;
  if (g) {
    await sb.from('game_sessions')
      .update({ ended_at: new Date().toISOString(), phase: 'abandoned' })
      .eq('id', g.id);
  }
  teardownFS();
  state.activeGame = null;
  renderRoom();
}

// ─── Name editor ───────────────────────────────────────
function openNameEditor() {
  if (!state.profile) return;
  const modal = $('#nameEditModal');
  const input = $('#nameEditInput');
  input.value = state.profile.display_name || '';
  modal.hidden = false;
  setTimeout(() => input.focus(), 50);
}

function closeNameEditor() {
  $('#nameEditModal').hidden = true;
}

async function saveNewName() {
  const input = $('#nameEditInput');
  const newName = input.value.trim();
  if (!newName) { toast('need a name'); return; }
  if (newName === state.profile.display_name) { closeNameEditor(); return; }

  const btn = $('#nameEditSave');
  btn.disabled = true;
  const orig = btn.innerHTML;
  btn.innerHTML = 'saving<span class="arrow">·</span>';

  try {
    const { data, error } = await sb
      .from('profiles')
      .update({ display_name: newName })
      .eq('id', state.user.id)
      .select()
      .single();
    if (error) throw error;
    state.profile = data;
    // update local member list immediately
    if (state.room && state.room.members) {
      state.room.members = state.room.members.map(m =>
        m.user_id === state.user.id ? { ...m, display_name: newName } : m
      );
    }
    closeNameEditor();
    renderRoom();
    toast('name updated');
  } catch (e) {
    console.error(e);
    toast('could not save', true);
    btn.disabled = false;
    btn.innerHTML = orig;
  }
}

document.getElementById('nameEditCancel').addEventListener('click', closeNameEditor);
document.getElementById('nameEditSave').addEventListener('click', saveNewName);
document.getElementById('nameEditInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') saveNewName();
  if (e.key === 'Escape') closeNameEditor();
});
document.getElementById('nameEditModal').addEventListener('click', (e) => {
  if (e.target.id === 'nameEditModal') closeNameEditor();
});

// ─── Copy code ─────────────────────────────────────────
document.addEventListener('click', (e) => {
  const tag = e.target.closest && e.target.closest('#codeTag');
  if (!tag) return;
  if (!state.room) return;
  navigator.clipboard.writeText(state.room.code).then(() => {
    tag.classList.add('copied');
    const orig = $('#codeValue').textContent;
    $('#codeValue').textContent = 'copied';
    setTimeout(() => {
      $('#codeValue').textContent = orig;
      tag.classList.remove('copied');
    }, 1200);
  }).catch(() => toast('could not copy'));
});

// ─── Routing ───────────────────────────────────────────
window.addEventListener('hashchange', handleHash);
async function handleHash() {
  const h = window.location.hash;
  const m = h.match(/^#\/r\/([A-Z]{4})$/i);
  if (m) {
    const code = m[1].toUpperCase();
    // need session + profile
    const { data: { user } } = await sb.auth.getUser();
    if (!user) {
      // home with code prefilled
      slots.forEach((s, i) => {
        s.value = code[i] || '';
        if (s.value) s.classList.add('filled');
      });
      show('screen-home');
      return;
    }
    state.user = user;
    const { data: prof } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
    if (!prof) {
      state.pendingAction = { type: 'join', code };
      goToNameScreen();
      return;
    }
    state.profile = prof;
    // check if already a member
    const { data: room } = await sb.from('rooms').select('id, code').eq('code', code).maybeSingle();
    if (!room) {
      goHome();
      return;
    }
    const { data: existing } = await sb.from('room_members').select('user_id').eq('room_id', room.id).eq('user_id', user.id).maybeSingle();
    if (existing) {
      show('screen-room');
      $('#roomBody').innerHTML = '<div class="loading">loading the room</div>';
      await loadRoom(code);
    } else {
      state.pendingAction = { type: 'join', code };
      // already have profile, just join
      await joinRoom(code);
    }
  } else {
    if (state.room) {
      // user navigated away, clean up
      state.room = null;
      state.activeGame = null;
      unsubscribeAll();
    }
    show('screen-home');
  }
}

// ─── Initial load ──────────────────────────────────────
(async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (user) state.user = user;
  if (user) {
    const { data: prof } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
    if (prof) state.profile = prof;
  }
  handleHash();
})();
</script>

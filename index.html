<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>between & together</title>
<meta name="theme-color" content="#0A0A12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0A0A12;
    --bg-soft: #14141F;
    --bg-card: #1A1A28;
    --bg-card-hover: #20202F;
    --text: #F5F0E5;
    --text-soft: #9994A0;
    --text-faint: #5A5563;
    --mint: #7FFFC4;
    --mint-soft: #5BE3A8;
    --mint-deep: #2EA876;
    --mint-glow: rgba(127, 255, 196, 0.25);
    --warn: #FF6B6B;
    --coral: #FF8C64;
  }

  html, body { height: 100%; overflow-x: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Bricolage Grotesque', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* atmospherics */
  .glow {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    filter: blur(80px);
  }
  .glow-1 {
    width: 500px; height: 500px;
    top: 30%; left: 50%;
    transform: translate(-50%, -50%);
    background: var(--mint);
    opacity: 0.08;
    animation: glowPulse 8s ease-in-out infinite;
  }
  .glow-2 {
    width: 300px; height: 300px;
    bottom: -100px; left: -100px;
    background: var(--mint);
    opacity: 0.05;
    animation: glowPulse2 12s ease-in-out infinite reverse;
  }
  @keyframes glowPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.15); }
  }
  @keyframes glowPulse2 {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
  .particle {
    position: absolute;
    background: var(--mint);
    border-radius: 50%;
    opacity: 0.4;
  }
  @keyframes floatParticle {
    0% { transform: translate(0, 0); }
    25% { transform: translate(20px, -30px); }
    50% { transform: translate(-15px, -60px); }
    75% { transform: translate(25px, -40px); }
    100% { transform: translate(0, 0); }
  }

  /* cursor companion */
  .cursor-dot, .cursor-ring {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
  }
  .cursor-dot {
    width: 6px; height: 6px;
    background: var(--mint);
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px var(--mint);
  }
  .cursor-ring {
    width: 36px; height: 36px;
    border: 1.5px solid var(--mint);
    transform: translate(-50%, -50%);
    transition: width 0.3s, height 0.3s, background 0.2s;
  }
  .cursor-ring.hover {
    width: 68px; height: 68px;
    background: var(--mint-glow);
  }
  @media (hover: none) {
    .cursor-dot, .cursor-ring { display: none; }
  }

  /* screens */
  .screen {
    display: none;
    position: relative;
    z-index: 10;
    min-height: 100vh;
    min-height: 100dvh;
    flex-direction: column;
    padding: 24px 22px;
    max-width: 520px;
    margin: 0 auto;
  }
  .screen.active { display: flex; }

  /* HEADER */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .wordmark {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-soft);
    cursor: pointer;
    user-select: none;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.3s;
  }
  .wordmark:hover { color: var(--mint); }
  .wordmark.spin { transform: rotate(360deg); }

  /* HOME */
  .home-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 0;
    gap: 60px;
  }
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .hero-word {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    font-size: clamp(46px, 13vw, 68px);
    line-height: 1;
    letter-spacing: -0.045em;
    color: var(--text);
    opacity: 0;
  }
  .hero-between { animation: heroIn 0.9s 0.2s forwards cubic-bezier(0.16, 1, 0.3, 1); }
  .hero-together { animation: heroIn 0.9s 0.6s forwards cubic-bezier(0.16, 1, 0.3, 1); }
  .hero-amp {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: clamp(130px, 36vw, 190px);
    line-height: 0.85;
    color: var(--mint);
    margin: -14px 0;
    cursor: pointer;
    user-select: none;
    text-shadow: 0 0 60px var(--mint-glow);
    opacity: 0;
    will-change: transform;
    animation: ampIn 1.2s 0.4s forwards cubic-bezier(0.34, 1.56, 0.64, 1),
               ampBreathe 5s 1.6s infinite ease-in-out;
    transform-origin: center;
  }
  @keyframes heroIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes ampIn {
    from { opacity: 0; transform: scale(0.3) rotate(-180deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
  }
  @keyframes ampBreathe {
    0%, 100% { transform: scale(1) rotate(0); }
    50% { transform: scale(1.06) rotate(-3deg); }
  }

  .actions {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    opacity: 0;
    animation: fadeUp 1s 1.1s forwards;
  }

  .btn-primary {
    width: 100%;
    background: var(--mint);
    color: var(--bg);
    border: none;
    padding: 22px 28px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
    border-radius: 20px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.15s;
    box-shadow: 0 6px 0 var(--mint-deep), 0 0 40px var(--mint-glow);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-primary:hover { background: var(--mint-soft); }
  .btn-primary:active {
    transform: translateY(5px);
    box-shadow: 0 1px 0 var(--mint-deep), 0 0 20px var(--mint-glow);
  }
  .btn-primary:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
  }
  .btn-primary .arrow {
    display: inline-block;
    transition: transform 0.25s ease;
    font-size: 22px;
  }
  .btn-primary:hover .arrow { transform: translateX(6px); }

  .btn-ghost {
    background: transparent;
    color: var(--text-soft);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 14px 22px;
    border-radius: 14px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost:hover {
    background: var(--bg-card);
    color: var(--text);
    border-color: rgba(255,255,255,0.2);
  }

  .divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--text-faint);
    opacity: 0.3;
  }

  .code-slots { display: flex; gap: 10px; width: 100%; justify-content: center; }
  .code-slot {
    flex: 1;
    max-width: 72px;
    height: 76px;
    background: var(--bg-card);
    border: 2px solid transparent;
    border-radius: 18px;
    font-family: 'Geist Mono', monospace;
    font-size: 32px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    text-transform: uppercase;
    outline: none;
    transition: all 0.2s;
  }
  .code-slot:focus {
    border-color: var(--mint);
    background: var(--bg-soft);
    transform: translateY(-3px);
    box-shadow: 0 0 24px var(--mint-glow);
  }
  .code-slot.filled {
    border-color: var(--mint);
    background: var(--bg-soft);
    color: var(--mint);
  }

  /* NAME prompt screen */
  .name-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 32px;
  }
  .name-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: clamp(36px, 9vw, 54px);
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .name-title .mint { color: var(--mint); }
  .name-sub {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-soft);
  }
  .name-input {
    width: 100%;
    background: var(--bg-card);
    border: 2px solid transparent;
    border-radius: 18px;
    padding: 22px 24px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    outline: none;
    transition: all 0.2s;
  }
  .name-input::placeholder { color: var(--text-faint); }
  .name-input:focus {
    border-color: var(--mint);
    background: var(--bg-soft);
    box-shadow: 0 0 24px var(--mint-glow);
  }

  /* ROOM screen */
  .room-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }
  .room-code-tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-card);
    padding: 10px 16px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .room-code-tag:hover { background: var(--bg-card-hover); border-color: var(--mint); }
  .room-code-label {
    font-family: 'Geist Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .room-code-value {
    font-family: 'Geist Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--mint);
  }
  .room-code-tag.copied .room-code-value { color: var(--mint); }

  .members {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .member-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-card);
    padding: 8px 14px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .member-chip.self { border-color: rgba(127, 255, 196, 0.3); }
  .member-presence {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-faint);
    flex-shrink: 0;
  }
  .member-presence.online {
    background: var(--mint);
    box-shadow: 0 0 8px var(--mint);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .member-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .member-empty {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 8px 14px;
    border: 1px dashed rgba(255,255,255,0.15);
    border-radius: 100px;
  }

  /* LOBBY */
  .lobby-main { flex: 1; display: flex; flex-direction: column; gap: 24px; padding-top: 12px; }
  .lobby-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: clamp(40px, 11vw, 60px);
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .lobby-title .mint { color: var(--mint); }
  .lobby-waiting {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .lobby-waiting .wait-label {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--mint);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .lobby-waiting .wait-label::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--mint);
    box-shadow: 0 0 8px var(--mint);
    animation: blink 2s ease-in-out infinite;
  }
  .lobby-waiting .wait-line {
    font-size: 17px;
    line-height: 1.45;
    color: var(--text);
  }
  .lobby-waiting .wait-tip {
    font-size: 13px;
    color: var(--text-soft);
    margin-top: 4px;
  }

  .games-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .game-card {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 22px;
    transition: all 0.2s ease;
    text-align: left;
    width: 100%;
    font-family: inherit;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }
  .game-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 100% 0%, var(--mint-glow), transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .game-card.is-disabled {
    opacity: 0.45;
  }

  .game-card-title {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.1;
  }
  .game-card-desc {
    font-size: 14px;
    color: var(--text-soft);
    line-height: 1.4;
  }

  .round-picker {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .round-chip {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.08);
    color: var(--text);
    padding: 14px 6px;
    border-radius: 14px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .round-chip:hover:not(:disabled) {
    background: rgba(127,255,196,0.08);
    border-color: var(--mint);
    color: var(--mint);
    transform: translateY(-2px);
  }
  .round-chip:active:not(:disabled) {
    transform: translateY(0);
  }
  .round-chip:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .round-chip-custom {
    border-style: dashed;
    letter-spacing: 0.02em;
    font-size: 12px;
  }

  /* WYR & TOD shared game header */
  .game-screen { flex: 1; display: flex; flex-direction: column; gap: 20px; padding-top: 4px; }
  .game-meta-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .game-back {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-soft);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 6px 0;
  }
  .game-back:hover { color: var(--mint); }
  .game-round {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  /* WYR */
  .wyr-question {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: clamp(26px, 7vw, 36px);
    font-weight: 500;
    letter-spacing: -0.025em;
    line-height: 1.15;
    text-align: center;
    margin: 24px 0 8px;
    min-height: 86px;
  }
  .wyr-choices {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .wyr-choice {
    background: var(--bg-card);
    border: 2px solid transparent;
    border-radius: 22px;
    padding: 22px 24px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    text-align: left;
    line-height: 1.35;
    cursor: pointer;
    transition: all 0.25s ease;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .wyr-choice:hover { background: var(--bg-card-hover); transform: translateY(-2px); }
  .wyr-choice.you { border-color: var(--mint); background: var(--bg-soft); box-shadow: 0 0 32px var(--mint-glow); }
  .wyr-choice.you-dimmed { opacity: 0.55; }
  .wyr-choice:disabled { cursor: default; }
  .wyr-choice:disabled:hover { transform: none; background: var(--bg-card); }
  .wyr-choice.them { border-color: var(--mint-deep); }
  .wyr-choice.both { border-color: var(--mint); background: var(--bg-soft); }

  .wyr-choice-tags {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    min-height: 18px;
  }
  .pick-tag {
    font-family: 'Geist Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 100px;
    background: rgba(127, 255, 196, 0.15);
    color: var(--mint);
    opacity: 0;
    animation: tagIn 0.4s forwards;
  }
  @keyframes tagIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .wyr-waiting {
    text-align: center;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin: 10px 0;
    min-height: 16px;
  }
  .wyr-waiting .blink-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--mint);
    margin-right: 8px;
    vertical-align: middle;
    animation: blink 1.4s ease-in-out infinite;
  }

  .reveal-banner {
    text-align: center;
    padding: 14px 20px;
    border-radius: 16px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    background: var(--bg-card);
    border: 1px solid rgba(127, 255, 196, 0.3);
    opacity: 0;
    animation: bannerIn 0.5s 0.2s forwards;
  }
  .reveal-banner.match {
    background: rgba(127, 255, 196, 0.12);
    color: var(--mint);
    border-color: var(--mint);
  }
  .reveal-banner.clash {
    color: var(--text);
  }
  @keyframes bannerIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .wyr-next {
    margin-top: 8px;
  }

  /* score chips */
  .scores {
    display: flex;
    gap: 10px;
    margin: 0;
  }
  .score-chip {
    background: var(--bg-card);
    padding: 8px 14px;
    border-radius: 100px;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-soft);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .score-chip .num {
    color: var(--mint);
    font-weight: 500;
  }

  /* TOD pick button (shared) */
  .tod-pick-btn {
    flex: 1;
    background: var(--bg-card);
    border: 2px solid transparent;
    border-radius: 22px;
    padding: 36px 20px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.02em;
  }
  .tod-pick-btn:hover {
    background: var(--bg-card-hover);
    border-color: var(--mint);
    transform: translateY(-2px);
  }

  .judge-btn {
    flex: 1;
    background: var(--bg-card);
    border: 2px solid transparent;
    border-radius: 18px;
    padding: 18px 16px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  .judge-btn.did:hover { border-color: var(--mint); color: var(--mint); }
  .judge-btn.didnt:hover { border-color: var(--warn); color: var(--warn); }

  /* TOD 2.0 */
  .tod2-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding-top: 4px;
  }
  .tod2-phase-banner {
    background: rgba(255, 140, 100, 0.12);
    border: 1px solid rgba(255, 140, 100, 0.3);
    border-radius: 16px;
    padding: 16px 20px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    text-align: center;
  }
  .tod2-prompt-card {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 32px 26px;
    font-size: clamp(22px, 5.5vw, 30px);
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.3;
    text-align: center;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeUp 0.35s ease;
  }
  .tod2-action-row {
    display: flex;
    gap: 12px;
  }
  .tod2-action-row .btn-ghost { flex: 1; }
  .tod2-action-row .btn-primary { flex: 2; }
  .tod2-waiting {
    text-align: center;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .tod2-theme-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .tod2-theme-card {
    background: var(--bg-card);
    border: 2px solid transparent;
    border-radius: 20px;
    padding: 20px 22px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    color: inherit;
    width: 100%;
  }
  .tod2-theme-card:hover:not([disabled]) {
    border-color: var(--mint);
    background: var(--bg-card-hover);
  }
  .tod2-theme-card.selected {
    border-color: var(--mint);
    background: var(--bg-soft);
    box-shadow: 0 0 24px var(--mint-glow);
  }
  .tod2-theme-card[disabled] { opacity: 0.7; cursor: default; }
  .tod2-theme-label {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .tod2-theme-desc {
    font-size: 13px;
    color: var(--text-soft);
  }
  .tod2-vote-indicator {
    text-align: center;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
  }

  /* end-of-game */
  .end-card {
    background: var(--bg-card);
    border: 1px solid var(--mint);
    border-radius: 24px;
    padding: 32px 26px;
    text-align: center;
    box-shadow: 0 0 40px var(--mint-glow);
  }
  .end-headline {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: clamp(32px, 8vw, 44px);
    font-weight: 600;
    letter-spacing: -0.04em;
    margin-bottom: 20px;
    line-height: 1;
  }
  .end-headline .mint { color: var(--mint); }
  .end-stat {
    font-size: 16px;
    color: var(--text-soft);
    margin: 6px 0;
  }
  .end-stat .num { color: var(--mint); font-weight: 600; }
  .end-actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    flex-direction: column;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-card);
    border: 1px solid var(--mint);
    color: var(--text);
    padding: 12px 22px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    z-index: 9998;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    box-shadow: 0 0 24px var(--mint-glow);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.err {
    border-color: var(--warn);
    box-shadow: 0 0 24px rgba(255, 107, 107, 0.25);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Editable self chip */
  .member-chip.editable {
    cursor: pointer;
    font-family: inherit;
    color: inherit;
    transition: all 0.15s;
  }
  .member-chip.editable:hover {
    background: var(--bg-card-hover);
    border-color: var(--mint);
  }
  .member-edit-hint {
    font-size: 11px;
    color: var(--text-soft);
    margin-left: 2px;
    opacity: 0.6;
  }
  .member-chip.editable:hover .member-edit-hint {
    color: var(--mint);
    opacity: 1;
  }

  /* Name edit modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 9000;
    background: rgba(10, 10, 18, 0.7);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: modalFade 0.2s ease-out;
  }
  .modal-backdrop[hidden] { display: none; }
  @keyframes modalFade {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .modal-card {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 26px 22px;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    animation: modalRise 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes modalRise {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-label {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-soft);
  }
  .modal-input {
    width: 100%;
    background: var(--bg);
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 16px 18px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    outline: none;
    transition: all 0.2s;
  }
  .modal-input:focus {
    border-color: var(--mint);
    box-shadow: 0 0 24px var(--mint-glow);
  }
  .modal-actions {
    display: flex;
    gap: 10px;
  }
  .modal-actions .btn-ghost { flex: 1; }
  .modal-actions .btn-primary {
    flex: 1.4;
    min-width: 0;
    padding: 14px 18px;
    font-size: 15px;
  }

  /* Finger Smash */
  .fs-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100%;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .fs-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0 12px;
  }
  .fs-round-pill {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-soft);
    padding: 6px 12px;
    background: var(--bg-card);
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .fs-counters {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .fs-counter {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .fs-counter-me { border-color: rgba(127, 255, 196, 0.3); }
  .fs-counter-them { border-color: rgba(255, 140, 100, 0.3); }
  .fs-counter-label {
    font-family: 'Geist Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 4px;
  }
  .fs-counter-me .fs-counter-label { color: var(--mint); }
  .fs-counter-them .fs-counter-label { color: #FF8C64; }
  .fs-counter-num {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .fs-tap-area {
    flex: 1;
    position: relative;
    background: #020408;
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    min-height: 400px;
    cursor: pointer;
  }
  #fsCanvas {
    position: absolute;
    inset: 0;
    z-index: 1;
    border-radius: 24px;
  }
  .fs-tap-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-soft);
    pointer-events: none;
    animation: blink 2s infinite;
  }
  .fs-overheat {
    position: absolute;
    inset: 0;
    z-index: 6;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(4px);
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #A78BFA;
    text-shadow: 0 0 20px rgba(167, 139, 250, 0.6);
    pointer-events: none;
    animation: fsOverheatPulse 0.6s ease-in-out infinite;
  }
  @keyframes fsOverheatPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .fs-countdown {
    position: absolute;
    inset: 0;
    z-index: 7;
    display: none;
    align-items: center;
    justify-content: center;
    font-family: 'Instrument Serif', 'Bricolage Grotesque', serif;
    font-style: italic;
    font-size: 180px;
    line-height: 1;
    color: var(--mint);
    text-shadow: 0 0 60px var(--mint-glow);
    pointer-events: none;
    background: rgba(2, 4, 8, 0.55);
    backdrop-filter: blur(8px);
  }
  .fs-powerup {
    position: absolute;
    z-index: 4;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(254, 243, 199, 0.15);
    border: 2px solid #FEF3C7;
    box-shadow: 0 0 20px rgba(254, 243, 199, 0.4), 0 0 40px rgba(254, 243, 199, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    pointer-events: none;
  }
  .fs-powerup .fs-powerup-icon {
    animation: fsPowerupSpin 8s linear infinite;
  }
  @keyframes fsPowerupSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* loading */
  .loading {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-soft);
  }
  .loading::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--mint);
    margin-right: 10px;
    animation: blink 1.4s ease-in-out infinite;
  }

  @media (max-width: 380px) {
    .screen { padding: 20px 16px; }
    .code-slot { max-width: 60px; height: 68px; font-size: 26px; }
  }

  /* ── Room History chips ── */
  .room-history {
    width: 100%;
    margin-top: 18px;
  }
  .room-history-label {
    font-family: 'Geist Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }
  .room-history-chips {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .room-history-chips::-webkit-scrollbar { display: none; }
  .room-history-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    padding: 10px 14px;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    color: inherit;
    flex-shrink: 0;
  }
  .room-history-chip:hover { border-color: var(--mint); background: var(--bg-card-hover); }
  .room-history-chip .rhc-code {
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--mint);
  }
  .room-history-chip .rhc-partner {
    font-size: 13px;
    color: var(--text-soft);
  }
  .room-history-chip .rhc-time {
    font-size: 11px;
    color: var(--text-faint);
  }
  .room-history-chip .rhc-arrow {
    font-size: 11px;
    color: var(--text-faint);
  }

  /* ── Avatar blobs ── */
  @keyframes avatarBreathe {
    0%, 100% { border-radius: 60% 40% 55% 45% / 55% 45% 60% 40%; transform: scale(1); }
    50% { border-radius: 45% 55% 40% 60% / 40% 60% 45% 55%; transform: scale(1.04); }
  }
  .avatar-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 8px;
    position: relative;
  }
  .avatar-blob {
    width: 52px;
    height: 52px;
    border-radius: 60% 40% 55% 45% / 55% 45% 60% 40%;
    animation: avatarBreathe 3s ease-in-out infinite;
    position: relative;
    flex-shrink: 0;
    transition: filter 0.4s, box-shadow 0.4s;
  }
  .avatar-blob.self {
    background: radial-gradient(circle at 40% 40%, var(--mint), var(--mint-deep));
  }
  .avatar-blob.partner {
    background: radial-gradient(circle at 40% 40%, var(--coral), #c0552a);
    animation-delay: -1.5s;
  }
  .avatar-blob.offline {
    filter: saturate(0) brightness(0.6);
  }
  .avatar-blob.glow-pulse {
    box-shadow: 0 0 24px var(--mint);
  }
  .avatar-presence-dot {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--mint);
    box-shadow: 0 0 6px var(--mint);
    border: 1.5px solid var(--bg);
    animation: blink 2s ease-in-out infinite;
  }
  .avatar-presence-dot.offline {
    background: var(--text-faint);
    box-shadow: none;
    animation: none;
  }
  .avatar-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
  }
  .avatar-name {
    font-size: 12px;
    color: var(--text-soft);
    font-weight: 500;
    max-width: 70px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: center;
  }
  .avatar-tether-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 40px;
    max-width: 80px;
    height: 52px;
    overflow: visible;
  }
  .avatar-tether-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* ── Game overlay (Change 2) ── */
  #game-overlay {
    position: fixed;
    inset: 0;
    z-index: 20;
    background: var(--bg);
    overflow-y: auto;
    padding: 24px 22px;
    max-width: 520px;
    margin: 0 auto;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
  }
  #game-overlay.active {
    transform: translateY(0);
    pointer-events: all;
  }
  #screen-room.game-active {
    transform: scale(0.95) translateY(-10px);
    filter: blur(3px);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s;
  }
  #screen-room {
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s;
  }
  .overlay-back {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-soft);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 6px 0;
    margin-bottom: 8px;
    display: block;
  }
  .overlay-back:hover { color: var(--mint); }

  /* ── WYR 2.0 Split Screen (Change 5) ── */
  .wyr-split {
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
    border-radius: 22px;
    overflow: hidden;
    min-height: 340px;
  }
  .wyr-half {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.25s;
    position: relative;
    border: none;
    font-family: inherit;
    color: var(--text);
    text-align: center;
    font-size: 18px;
    font-weight: 500;
    line-height: 1.35;
  }
  .wyr-half-a {
    background: var(--bg-card);
    background: linear-gradient(to bottom, rgba(127,255,196,0.08) 0%, var(--bg-card) 100%);
  }
  .wyr-half-b {
    background: var(--bg-card);
    background: linear-gradient(to top, rgba(255,140,100,0.07) 0%, var(--bg-card) 100%);
  }
  .wyr-half:disabled { cursor: default; }
  .wyr-half.you { box-shadow: inset 0 0 0 3px var(--mint); }
  .wyr-half.both { background: rgba(127,255,196,0.13); box-shadow: inset 0 0 0 3px var(--mint); }
  .wyr-half.you-dimmed { opacity: 0.55; }
  .wyr-half.them { box-shadow: inset 0 0 0 2px var(--mint-deep); }
  .wyr-half.winner-glow { background: rgba(127,255,196,0.18); box-shadow: inset 0 0 0 3px var(--mint), 0 0 30px var(--mint-glow); }
  .wyr-half.loser-tint { background: rgba(255,107,107,0.10); }
  .wyr-split-divider {
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    transform: translateY(-50%);
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .wyr-split-pill {
    background: rgba(20,20,31,0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    padding: 10px 20px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    max-width: 280px;
    letter-spacing: -0.01em;
    line-height: 1.3;
    pointer-events: none;
  }
  .wyr-half-tags {
    position: absolute;
    bottom: 10px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 6px;
  }

  /* blink-dot helper */
  .blink-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--mint);
    animation: blink 1.4s ease-in-out infinite;
    flex-shrink: 0;
  }

  /* ── FS 2.0 styles (Change 7) ── */
  .fs-walkthrough {
    position: absolute;
    inset: 0;
    z-index: 30;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px;
    text-align: center;
  }
  .fs-wt-icon { font-size: 64px; }
  .fs-wt-text {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.3;
  }
  .fs-wt-dots {
    display: flex;
    gap: 8px;
  }
  .fs-wt-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-faint);
    transition: background 0.3s;
  }
  .fs-wt-dot.active { background: var(--mint); }
  .fs-powerup {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    z-index: 8;

  room: null,                  // {id, code, members: [{user_id, role, display_name}]}
  presence: new Set(),         // set of user_ids currently present
  activeGame: null,            // {id, type, phase, state, version, current_turn_user_id}
  channels: [],                // active realtime channels
  wyrLastChoiceRound: -1       // local guard against multi-tap
};

// ─── Room History (Change 1) ───────────────────────────
const ROOM_HISTORY_KEY = 'bt-room-history';
function getRoomHistory() {
  try { return JSON.parse(localStorage.getItem(ROOM_HISTORY_KEY) || '[]'); } catch(e) { return []; }
}
function upsertRoomHistory(entry) {
  let hist = getRoomHistory().filter(h => h.code !== entry.code);
  hist.unshift({ ...entry, ts: Date.now() });
  if (hist.length > 10) hist = hist.slice(0, 10);
  localStorage.setItem(ROOM_HISTORY_KEY, JSON.stringify(hist));
}
function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}
function renderRoomHistory() {
  const hist = getRoomHistory();
  const wrap = document.getElementById('roomHistory');
  const chips = document.getElementById('roomHistoryChips');
  if (!wrap || !chips) return;
  if (!hist.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  chips.innerHTML = hist.map((h, i) => `
    <button class="room-history-chip" data-idx="${i}">
      <span class="rhc-code">${escapeHtml(h.code)}</span>
      ${h.partnerName ? `<span class="rhc-partner">· ${escapeHtml(h.partnerName)}</span>` : ''}
      <span class="rhc-time">${timeAgo(h.ts)}</span>
      <span class="rhc-arrow">›</span>
    </button>
  `).join('');
  chips.querySelectorAll('.room-history-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const h = hist[parseInt(btn.dataset.idx)];
      if (!h) return;
      // if we have auth and userId matches stored, skip join flow
      if (state.user && state.user.id === h.userId && state.profile) {
        show('screen-room');
        document.getElementById('roomBody').innerHTML = '<div class="loading">loading the room</div>';
        loadRoom(h.code);
      } else {
        startFlow({ type: 'join', code: h.code });
      }
    });
  });
}

// ─── Utility ───────────────────────────────────────────
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return Array.from(document.querySelectorAll(sel)); }

function show(screenId) {
  $$('.screen').forEach(s => s.classList.remove('active'));
  $('#' + screenId).classList.add('active');
}

function toast(msg, isErr) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.toggle('err', !!isErr);
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2400);
}

function genCode() {
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ';
  let c = '';
  for (let i = 0; i < 4; i++) c += chars[Math.floor(Math.random() * chars.length)];
  return c;
}

function partnerOf(members) {
  if (!state.user) return null;
  return members.find(m => m.user_id !== state.user.id) || null;
}

function selfOf(members) {
  if (!state.user) return null;
  return members.find(m => m.user_id === state.user.id) || null;
}

const slots = $$('.code-slot');
slots.forEach((slot, i) => {
  slot.addEventListener('input', (e) => {
    let v = e.target.value.toUpperCase().replace(/[^A-Z]/g, '');
    e.target.value = v;
    if (v) {
      slot.classList.add('filled');
      if (i < slots.length - 1) slots[i + 1].focus();
      else if (slots.every(s => s.value)) submitJoinFromSlots();
    } else {
      slot.classList.remove('filled');
    }
  });
  slot.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !slot.value && i > 0) {
      slots[i - 1].focus();
      slots[i - 1].value = '';
      slots[i - 1].classList.remove('filled');
    }
  });
});

function submitJoinFromSlots() {
  const code = slots.map(s => s.value).join('');
  if (code.length === 4) startFlow({ type: 'join', code });
}

// ─── Auth flow ─────────────────────────────────────────
async function startFlow(action) {
  state.pendingAction = action;
  if (action.type === 'join') {
    // pre-check the room exists (capacity is enforced by trigger on insert)
    const { data: room, error } = await sb
      .from('rooms')
      .select('id, code')
      .eq('code', action.code)
      .maybeSingle();
    if (error || !room) {
      toast('no room with that code', true);
      slots.forEach(s => { s.value = ''; s.classList.remove('filled'); });
      slots[0].focus();
      return;
    }
  }

  // ensure auth
  const { data: { user } } = await sb.auth.getUser();
  if (user) {
    state.user = user;
    // check profile
    const { data: prof } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
    if (prof) {
      state.profile = prof;
      proceedAfterAuth();
      return;
    }
  }
  // need to sign in & set name
  goToNameScreen();
}

function goToNameScreen() {
  if (state.pendingAction.type === 'create') {
    $('#nameSub').textContent = 'about to open a room';
  } else {
    $('#nameSub').textContent = `joining ${state.pendingAction.code}`;
  }
  show('screen-name');
  setTimeout(() => $('#nameInput').focus(), 200);
}

$('#nameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') $('#nameContinue').click();
});

$('#nameContinue').addEventListener('click', async () => {
  const name = $('#nameInput').value.trim();
  if (!name) { toast('need a name'); return; }
  const btn = $('#nameContinue');
  btn.disabled = true;
  btn.innerHTML = 'just a sec<span class="arrow">·</span>';

  try {
    let user = state.user;
    if (!user) {
      const { data, error } = await sb.auth.signInAnonymously();
      if (error) throw error;
      user = data.user;
      state.user = user;
    }
    const { data: prof, error: pErr } = await sb
      .from('profiles')
      .upsert({ id: user.id, display_name: name })
      .select('*')
      .single();
    if (pErr) throw pErr;
    state.profile = prof;
    proceedAfterAuth();
  } catch (e) {
    console.error(e);
    toast('something went wrong', true);
    btn.disabled = false;
    btn.innerHTML = 'continue <span class="arrow">→</span>';
  }
});

async function proceedAfterAuth() {
  if (state.pendingAction.type === 'create') {
    await createRoom();
  } else {
    await joinRoom(state.pendingAction.code);
  }
}

// ─── Room create / join ────────────────────────────────
async function createRoom() {
  show('screen-room');
  $('#roomBody').innerHTML = '<div class="loading">opening a room</div>';

  let code, room, attempt = 0;
  while (attempt < 5) {
    code = genCode();
    const { data, error } = await sb
      .from('rooms')
      .insert({ code, created_by: state.user.id })
      .select()
      .single();
    if (!error) { room = data; break; }
    if (error.code !== '23505') {
      console.error(error);
      toast('could not open room', true);
      return goHome();
    }
    attempt++;
  }
  if (!room) { toast('could not open room', true); return goHome(); }

  // add self as host
  const { error: mErr } = await sb
    .from('room_members')
    .insert({ room_id: room.id, user_id: state.user.id, role: 'host' });
  if (mErr) {
    console.error(mErr);
    toast('could not open room', true);
    return goHome();
  }

  window.location.hash = '/r/' + room.code;
  await loadRoom(room.code);
}

async function joinRoom(code) {
  show('screen-room');
  $('#roomBody').innerHTML = '<div class="loading">slipping into the room</div>';

  const { data: room, error } = await sb
    .from('rooms')
    .select('id, code')
    .eq('code', code)
    .maybeSingle();
  if (error || !room) { toast('no room with that code', true); return goHome(); }

  // try insert (idempotent if already a member)
  const { data: existing } = await sb
    .from('room_members')
    .select('user_id')
    .eq('room_id', room.id)
    .eq('user_id', state.user.id)
    .maybeSingle();

  if (!existing) {
    const { error: jErr } = await sb
      .from('room_members')
      .insert({ room_id: room.id, user_id: state.user.id, role: 'guest' });
    if (jErr) {
      console.error(jErr);
      const msg = jErr.message && jErr.message.includes('full') ? 'that room is full' : 'could not join';
      toast(msg, true);
      return goHome();
    }
  }

  window.location.hash = '/r/' + room.code;
  await loadRoom(room.code);
}

async function loadRoom(code) {
  const { data: room, error } = await sb
    .from('rooms')
    .select('id, code, created_by, created_at, display_name')
    .eq('code', code)
    .maybeSingle();
  if (error || !room) { toast('that room is gone', true); return goHome(); }

  // load members with profiles
  const { data: members } = await sb
    .from('room_members')
    .select('user_id, role, joined_at')
    .eq('room_id', room.id);

  const ids = (members || []).map(m => m.user_id);
  let profilesMap = {};
  if (ids.length) {
    const { data: profs } = await sb
      .from('profiles')
      .select('id, display_name')
      .in('id', ids);
    (profs || []).forEach(p => { profilesMap[p.id] = p.display_name; });
  }

  state.room = {
    ...room,
    members: (members || []).map(m => ({
      ...m, display_name: profilesMap[m.user_id] || '...'
    }))
  };

  // load active game
  const { data: activeGame } = await sb
    .from('game_sessions')
    .select('*')
    .eq('room_id', room.id)
    .is('ended_at', null)
    .maybeSingle();
  state.activeGame = activeGame || null;

  await unsubscribeAll();
  subscribeRoom();
  startPolling();

  // upsert room history
  const partner = partnerOf(state.room.members);
  const displayName = room.display_name || (partner && partner.display_name) || null;
  upsertRoomHistory({
    code: room.code,
    displayName,
    partnerName: partner ? partner.display_name : null,
    userId: state.user ? state.user.id : null,
    lastPlayed: new Date().toISOString()
  });

  // Show room naming modal if second player joining for first time and no display_name yet
  const isNewSecondPlayer = !room.display_name && partner &&
    partner.user_id !== (room.created_by) &&
    state.user && state.user.id !== room.created_by &&
    members && members.length === 2;
  if (isNewSecondPlayer && !localStorage.getItem('bt-named-' + room.code)) {
    localStorage.setItem('bt-named-' + room.code, '1');
    setTimeout(() => openRoomNameModal(room), 600);
  }

  renderRoom();
}

// ─── Sync layer (defense in depth against realtime gaps) ───
let _pollTimer = null;
function startPolling() {
  if (_pollTimer) clearInterval(_pollTimer);
  _pollTimer = setInterval(syncRoomState, 4000);
}
function stopPolling() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
}

async function syncRoomState() {
  if (!state.room) return;
  try {
    // refetch active game
    const { data: game } = await sb
      .from('game_sessions')
      .select('*')
      .eq('room_id', state.room.id)
      .is('ended_at', null)
      .maybeSingle();

    // if a previously-active game has ended or vanished, refetch by id
    if (!game && state.activeGame && !state.activeGame.ended_at) {
      const { data: prev } = await sb
        .from('game_sessions')
        .select('*')
        .eq('id', state.activeGame.id)
        .maybeSingle();
      state.activeGame = prev || null;
      renderRoom();
      return;
    }

    // adopt newer state from DB
    if (game) {
      if (!state.activeGame || game.id !== state.activeGame.id || game.version > state.activeGame.version) {
        state.activeGame = game;
        renderRoom();
      }
      // refresh wyr moves whenever WYR is active
      if (game.game_type === 'wyr') {
        await refreshWyrRound();
      }
    }

    // refetch members (catches missed join/leave events)
    const { data: members } = await sb
      .from('room_members')
      .select('user_id, role, joined_at')
      .eq('room_id', state.room.id);
    if (members) {
      const ids = members.map(m => m.user_id);
      const profMap = {};
      (state.room.members || []).forEach(m => profMap[m.user_id] = m.display_name);
      const missing = ids.filter(id => !profMap[id]);
      if (missing.length) {
        const { data: profs } = await sb
          .from('profiles').select('id, display_name').in('id', missing);
        (profs || []).forEach(p => { profMap[p.id] = p.display_name; });
      }
      const before = JSON.stringify(state.room.members.map(m => m.user_id).sort());
      state.room.members = members.map(m => ({
        ...m, display_name: profMap[m.user_id] || '...'
      }));
      const after = JSON.stringify(ids.sort());
      if (before !== after) renderRoom();
    }
  } catch (e) {
    // silent fail, next tick tries again
    console.debug('sync error', e);
  }
}

// Refetch on visibility change (user comes back to tab/app)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.room) {
    syncRoomState();
  }
});

// Refetch on network reconnect
window.addEventListener('online', () => {
  if (state.room) syncRoomState();
});

// ─── Realtime ──────────────────────────────────────────
async function unsubscribeAll() {
  for (const ch of state.channels) {
    try { await sb.removeChannel(ch); } catch (e) {}
  }
  state.channels = [];
  state.presence = new Set();
}

function subscribeRoom() {
  if (!state.room) return;
  const roomId = state.room.id;

  // room_members changes
  const memCh = sb.channel(`room:${roomId}:members`)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'room_members',
      filter: `room_id=eq.${roomId}`
    }, async () => {
      // refetch members
      const { data: members } = await sb
        .from('room_members').select('user_id, role, joined_at').eq('room_id', roomId);
      const ids = (members || []).map(m => m.user_id);
      let profilesMap = {};
      (state.room.members || []).forEach(m => profilesMap[m.user_id] = m.display_name);
      const missing = ids.filter(id => !profilesMap[id]);
      if (missing.length) {
        const { data: profs } = await sb
          .from('profiles').select('id, display_name').in('id', missing);
        (profs || []).forEach(p => { profilesMap[p.id] = p.display_name; });
      }
      state.room.members = (members || []).map(m => ({
        ...m, display_name: profilesMap[m.user_id] || '...'
      }));
      renderRoom();
    })
    .subscribe();
  state.channels.push(memCh);

  // game_sessions changes
  const gameCh = sb.channel(`room:${roomId}:games`)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'game_sessions',
      filter: `room_id=eq.${roomId}`
    }, async (payload) => {
      if (payload.eventType === 'DELETE') {
        if (state.activeGame && payload.old.id === state.activeGame.id) {
          state.activeGame = null;
          renderRoom();
        }
        return;
      }
      const row = payload.new;
      if (row.ended_at) {
        if (state.activeGame && state.activeGame.id === row.id) {
          state.activeGame = row;
          renderRoom();
        }
        return;
      }
      // active
      if (!state.activeGame || state.activeGame.version <= row.version) {
        state.activeGame = row;
        renderRoom();
      }
    })
    .subscribe();
  state.channels.push(gameCh);

  // wyr moves changes
  const wyrCh = sb.channel(`room:${roomId}:wyr`)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'wyr_moves'
    }, async (payload) => {
      if (!state.activeGame || state.activeGame.game_type !== 'wyr') return;
      if (payload.new.game_id !== state.activeGame.id) return;
      // refetch moves for current round
      await refreshWyrRound();
    })
    .subscribe();
  state.channels.push(wyrCh);

  // presence
  const presCh = sb.channel(`room:${roomId}:presence`, { config: { presence: { key: state.user.id } } });
  presCh
    .on('presence', { event: 'sync' }, () => {
      const pres = presCh.presenceState();
      state.presence = new Set(Object.keys(pres));
      renderRoom();
    })
    .subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await presCh.track({ online_at: new Date().toISOString() });
      }
    });
  state.channels.push(presCh);
}

    if (state.activeGame && state.activeGame.ended_at && state.activeGame.game_type === 'tod') {
      openGameOverlay();

      renderTOD2();

function animateTether() {

  if (_tetherAnimFrame) cancelAnimationFrame(_tetherAnimFrame);
  tick();
}

// ─── Game start ────────────────────────────────────────
async function startGame(type, rounds) {
  const me = selfOf(state.room.members);
  const partner = partnerOf(state.room.members);
  if (!partner) return;

  let initialState;
  let initialPhase;
  let initialTurn = null;

  if (type === 'wyr') {
    const n = rounds || ROUNDS_WYR_DEFAULT;
    const prompts = pickWyrPrompts(n);
    initialState = {
      round: 0,
      prompts,
      total_rounds: n,
      scores: { same: 0, different: 0 },
      history: []
    };
    initialPhase = 'pick';
  } else if (type === 'tod') {
    const n = rounds || ROUNDS_TOD_DEFAULT;
    initialState = {
      theme: null,
      themeVotes: {},
      currentTurn: partner.user_id,
      chooser: me.user_id,
      phase: 'theme_vote',
      promptIndex: null,
      usedPrompts: [],
      choice: null,
      prompt: null,
      round: 0,
      totalRounds: n,
      skips: { [me.user_id]: 0, [partner.user_id]: 0 },
      completedBy: null,
      judgedBy: null
    };
    initialPhase = 'theme_vote';
    initialTurn = me.user_id;
  } else if (type === 'fs') {
    const n = rounds || 1;
    initialState = {
      total_rounds: n,
      match_round: 0,
      scores: {},
      match_winner: null
    };
    initialState.scores[me.user_id] = 0;
    initialState.scores[partner.user_id] = 0;
    initialPhase = 'countdown';
  }

  const { data, error } = await sb
    .from('game_sessions')
    .insert({
      room_id: state.room.id,
      game_type: type,
      phase: initialPhase,
      state: initialState,
      current_turn_user_id: initialTurn
    })
    .select()
    .single();
  if (error) {
    console.error(error);
    toast('could not start the game', true);
    return;
  }
  state.activeGame = data;
  state.wyrLastChoiceRound = -1;
  teardownFS();
  renderRoom();
}

// ─── Cross-game prompt memory (per room, persisted in localStorage) ───
function _promptMemKey(code) { return `bt-prompts-${code}`; }
function getUsedPromptIdxs(code, bucket) {
  try {
    const raw = localStorage.getItem(_promptMemKey(code));
    if (!raw) return [];
    const obj = JSON.parse(raw);
    const path = bucket.split('.');
    let cur = obj;
    for (const k of path) { cur = cur && cur[k]; }
    return Array.isArray(cur) ? cur : [];
  } catch (e) { return []; }
}
function addUsedPromptIdxs(code, bucket, idxs) {
  try {
    const raw = localStorage.getItem(_promptMemKey(code));
    const obj = raw ? JSON.parse(raw) : {};
    const path = bucket.split('.');
    let cur = obj;
    for (let i = 0; i < path.length - 1; i++) {
      if (!cur[path[i]]) cur[path[i]] = {};
      cur = cur[path[i]];
    }
    const last = path[path.length - 1];
    const existing = Array.isArray(cur[last]) ? cur[last] : [];
    const merged = Array.from(new Set([...existing, ...idxs]));
    cur[last] = merged;
    localStorage.setItem(_promptMemKey(code), JSON.stringify(obj));
  } catch (e) {}
}
function pickFreshIdx(poolLen, usedIdxs) {
  const available = [];
  for (let i = 0; i < poolLen; i++) if (!usedIdxs.includes(i)) available.push(i);
  if (available.length === 0) return Math.floor(Math.random() * poolLen);
  return available[Math.floor(Math.random() * available.length)];
}
function pickFreshIdxs(poolLen, n, usedIdxs) {
  let available = [];
  for (let i = 0; i < poolLen; i++) if (!usedIdxs.includes(i)) available.push(i);
  if (available.length < n) {
    // ran out, reset and re-pick from full pool
    available = [];
    for (let i = 0; i < poolLen; i++) available.push(i);
  }
  // shuffle and take n
  available.sort(() => Math.random() - 0.5);
  return available.slice(0, n);
}

function pickN(pool, n) {
  // legacy path (fallback if no room context); still works
  const shuffled = [...pool].map(p => ({ p, r: Math.random() })).sort((a, b) => a.r - b.r).map(x => x.p);
  return shuffled.slice(0, n);
}

function pickWyrPrompts(n) {
  if (!state.room) return pickN(WYR_PROMPTS, n);
  const used = getUsedPromptIdxs(state.room.code, 'wyr');
  const idxs = pickFreshIdxs(WYR_PROMPTS.length, n, used);
  addUsedPromptIdxs(state.room.code, 'wyr', idxs);
  return idxs.map(i => WYR_PROMPTS[i]);
}

// ─── WYR rendering ────────────────────────────────────
async function refreshWyrRound() {
  if (!state.activeGame || state.activeGame.game_type !== 'wyr') return;
  const round = state.activeGame.state.round;
  const { data: moves } = await sb
    .from('wyr_moves')
    .select('user_id, choice, round')
    .eq('game_id', state.activeGame.id)
    .eq('round', round);
  state._wyrMoves = moves || [];

  // if both have moved and we're still in 'pick', attempt to advance to 'reveal'.
  // Both clients may attempt this; only the one whose UPDATE actually mutates
  // a row will update local state. The other receives the change via realtime.
  if (state.activeGame.phase === 'pick' && (moves || []).length >= 2) {
    const newState = JSON.parse(JSON.stringify(state.activeGame.state));
    const a = moves[0], b = moves[1];
    const match = a.choice === b.choice;
    newState.scores = {
      same: (newState.scores.same || 0) + (match ? 1 : 0),
      different: (newState.scores.different || 0) + (match ? 0 : 1)
    };
    newState.history.push({
      prompt: newState.prompts[round],
      choices: { [a.user_id]: a.choice, [b.user_id]: b.choice }
    });
    const { data, error } = await sb
      .from('game_sessions')
      .update({ state: newState, phase: 'reveal' })
      .eq('id', state.activeGame.id)
      .eq('version', state.activeGame.version)
      .eq('phase', 'pick')
      .select();
    if (!error && data && data.length > 0) {
      state.activeGame = data[0];
    }
  }
  renderRoom();
}

function renderWYR() {
  const body = document.getElementById('overlayBody');
  const g = state.activeGame;
  const round = g.state.round;
  const prompt = g.state.prompts[round];
  const me = selfOf(state.room.members);
  const partner = partnerOf(state.room.members);
  const moves = state._wyrMoves || [];
  const myMove = moves.find(m => m.user_id === me.user_id);
  const theirMove = moves.find(m => m.user_id === (partner && partner.user_id));
  const isReveal = g.phase === 'reveal';

  // Determine half classes for reveal
  const halfCls = [0, 1].map(idx => {
    const youPicked = myMove && myMove.choice === idx;
    const theyPicked = theirMove && theirMove.choice === idx;
    let cls = idx === 0 ? 'wyr-half wyr-half-a phys-card' : 'wyr-half wyr-half-b phys-card';
    if (isReveal) {
      if (youPicked && theyPicked) cls += ' both winner-glow';
      else if (youPicked) cls += ' you';
      else if (theyPicked) cls += ' them';
      else if (myMove || theirMove) cls += ' loser-tint';
    } else if (myMove) {
      cls += youPicked ? ' you' : ' you-dimmed';
    }
    return cls;
  });

  const tagHtml = (idx) => {
    const youPicked = myMove && myMove.choice === idx;
    const theyPicked = theirMove && theirMove.choice === idx;
    const tags = [];
    if (youPicked) tags.push(`<span class="pick-tag">you</span>`);
    if (theyPicked) tags.push(`<span class="pick-tag">${escapeHtml((partner && partner.display_name) || 'them')}</span>`);
    return tags.length ? `<div class="wyr-half-tags">${tags.join('')}</div>` : '';
  };

  let bannerText = '';
  if (isReveal && myMove && theirMove) {
    const match = myMove.choice === theirMove.choice;
    bannerText = match ? '✦ same pick' : 'different picks';
  }

  let waitMsg = '';
  if (!myMove && !theirMove) waitMsg = 'both still thinking';
  else if (myMove && !theirMove) waitMsg = '<span class="blink-dot"></span>waiting for them';
  else if (!myMove && theirMove) waitMsg = '<span class="blink-dot"></span>they picked. your turn';

  const disabled = myMove || isReveal ? 'disabled' : '';
  const nextBtn = isReveal
    ? `<button class="btn-primary wyr-next phys-card" id="wyrNext" style="margin-top:16px">${round + 1 >= g.state.prompts.length ? 'see how it went' : 'next round'} <span class="arrow">→</span></button>`
    : '';

  body.innerHTML = `
    <div class="game-screen">
      <div class="game-meta-bar">
        <button class="game-back" id="backToLobby">← lobby</button>
        <div class="scores">
          <div class="score-chip">same <span class="num">${g.state.scores.same || 0}</span></div>
          <div class="score-chip">diff <span class="num">${g.state.scores.different || 0}</span></div>
        </div>
        <div class="game-round">${round + 1}/${g.state.prompts.length}</div>
      </div>
      <div class="wyr-split">
        <button class="${halfCls[0]}" data-choice="0" ${disabled}>${escapeHtml(prompt[0])}${tagHtml(0)}</button>
        <div class="wyr-split-divider">
          <div class="wyr-split-pill">
            ${isReveal && bannerText ? bannerText : (isReveal ? 'revealed' : 'would you rather')}
          </div>
        </div>
        <button class="${halfCls[1]}" data-choice="1" ${disabled}>${escapeHtml(prompt[1])}${tagHtml(1)}</button>
      </div>
      ${isReveal ? '' : `<div class="wyr-waiting" style="margin-top:12px">${waitMsg}</div>`}
      ${nextBtn}
    </div>
  `;

  // card physics
  body.querySelectorAll('.phys-card').forEach(el => {
    if (el.disabled) return;
    el.addEventListener('pointerdown', () => { el.style.transform = 'scale(0.97)'; });
    const rel = () => {
      el.style.transition = 'transform 0.35s cubic-bezier(0.34,1.56,0.64,1)';
      el.style.transform = '';
      setTimeout(() => el.style.transition = '', 350);
    };
    el.addEventListener('pointerup', rel);
    el.addEventListener('pointercancel', rel);
  });

  body.querySelectorAll('.wyr-half').forEach(btn => {
    btn.addEventListener('pointerup', () => {
      if (btn.disabled) return;
      makeWyrChoice(parseInt(btn.dataset.choice));
    });
  });
  if (isReveal) {
    document.getElementById('wyrNext').addEventListener('pointerup', advanceWyrRound);
  }
  document.getElementById('backToLobby').addEventListener('click', () => confirmEndGame());

  if (!state._wyrMoves) refreshWyrRound();
}

async function makeWyrChoice(choice) {
  const g = state.activeGame;
  const round = g.state.round;
  if (state.wyrLastChoiceRound === round) return;
  state.wyrLastChoiceRound = round;

  const { error } = await sb
    .from('wyr_moves')
    .insert({ game_id: g.id, user_id: state.user.id, round, choice });
  if (error && error.code !== '23505') {
    console.error(error);
    toast('could not register your pick', true);
    state.wyrLastChoiceRound = -1;
    return;
  }
  await refreshWyrRound();
}

async function advanceWyrRound() {
  const g = state.activeGame;
  const nextRound = g.state.round + 1;
  if (nextRound >= g.state.prompts.length) {
    // end game
    await sb.from('game_sessions')
      .update({ ended_at: new Date().toISOString(), phase: 'ended' })
      .eq('id', g.id);
    return;
  }
  const newState = { ...g.state, round: nextRound };
  const { error } = await sb
    .from('game_sessions')
    .update({ state: newState, phase: 'pick' })
    .eq('id', g.id)
    .eq('version', g.version);
  if (error) console.error(error);
  state._wyrMoves = [];
  state.wyrLastChoiceRound = -1;
}

const TOD_PHASE_RENDERERS = {
  theme_vote:    renderTODThemeVote,
  chooser_picks: renderTODChooserPicks,

  judging:       renderTODJudging,
  end:           renderTODEnd

function renderTOD2() {
  const g = state.activeGame;

  const me = selfOf(state.room.members);

  const iAmCurrentTurn = g.state.currentTurn === state.user.id;
  const iAmChooser = g.state.chooser === state.user.id;
  const partnerName = (partner && partner.display_name) || 'them';
  const myName = me ? me.display_name : 'you';
  const renderer = TOD_PHASE_RENDERERS[g.state.phase] || TOD_PHASE_RENDERERS['end'];
  renderer(g.state, iAmCurrentTurn, iAmChooser, state.user.id, partnerName, myName);
}

function getTODBody() {
  return document.getElementById('overlayBody');
}

function pickPrompt(theme, type, usedPrompts) {
  const pool = TOD_PROMPTS[theme][type];
  const usedSet = new Set((usedPrompts || []).filter(u => u.startsWith(theme + '/' + type + '/')).map(u => parseInt(u.split('/')[2])));
  let available = pool.map((_, i) => i).filter(i => !usedSet.has(i));
  if (available.length === 0) available = pool.map((_, i) => i);
  return available[Math.floor(Math.random() * available.length)];
}

function promptKey(theme, type, idx) {
  return theme + '/' + type + '/' + idx;
}

  const body = getTODBody();

  body.innerHTML =

    '</div>' +

    '<p style="color:var(--text-soft);font-size:14px;margin-bottom:24px">both pick — highest wins if you disagree</p>' +
    '<div class="tod2-theme-grid">' +
    themes.map(function(t) {
      return '<button class="tod2-theme-card' + (myVote === t.key ? ' selected' : '') + '" data-theme="' + t.key + '"' + (myVote ? ' disabled' : '') + '>' +
        '<div class="tod2-theme-label">' + t.label + '</div>' +
        '<div class="tod2-theme-desc">' + t.desc + '</div>' +
        '</button>';
    }).join('') +
    '</div>' +
    (myVote ? '<div class="tod2-vote-indicator"><span class="blink-dot"></span>you picked ' + myVote + ' — waiting for ' + escapeHtml(partnerName) + '...</div>' : '') +
    '</div>';

  document.getElementById('backToLobby').addEventListener('click', function() { confirmEndGame(); });
  body.querySelectorAll('.tod2-theme-card:not([disabled])').forEach(function(btn) {
    btn.addEventListener('pointerup', function() { castThemeVote(btn.dataset.theme); });

async function castThemeVote(theme) {
  const g = state.activeGame;
  const newVotes = Object.assign({}, g.state.themeVotes, { [state.user.id]: theme });
  const partner = partnerOf(state.room.members);
  const bothVoted = partner && newVotes[partner.user_id] && newVotes[state.user.id];
  let newState = Object.assign({}, g.state, { themeVotes: newVotes });
  let newPhase = g.phase;
  if (bothVoted) {
    const rank = { casual: 0, spicy: 1, unfiltered: 2 };
    const myVote = newVotes[state.user.id];
    const theirVote = newVotes[partner.user_id];
    const winningTheme = rank[myVote] >= rank[theirVote] ? myVote : theirVote;
    newState.theme = winningTheme;
    newState.phase = 'chooser_picks';
    newPhase = 'chooser_picks';
  }
  await sb.from('game_sessions')
    .update({ phase: newPhase, state: newState })
    .eq('id', g.id);
}

async function tod2PickChoice(choice) {
  const g = state.activeGame;
  const theme = g.state.theme || 'casual';
  const idx = pickPrompt(theme, choice, g.state.usedPrompts);
  const promptText = TOD_PROMPTS[theme][choice][idx];
  const newUsed = (g.state.usedPrompts || []).concat([promptKey(theme, choice, idx)]);
  await sb.from('game_sessions')
    .update({
      phase: 'prompt_active',
      state: Object.assign({}, g.state, {
        choice: choice,
        promptIndex: idx,
        prompt: promptText,
        usedPrompts: newUsed,
        completedBy: null,
        judgedBy: null,
        phase: 'prompt_active'
      })
    })
    .eq('id', g.id);
}

async function tod2Skip() {

async function tod2Confirm(completed) {
  const g = state.activeGame;
  const newState = Object.assign({}, g.state, { judgedBy: state.user.id });
  if (!completed) {
    newState.skips = Object.assign({}, newState.skips);
    newState.skips[g.state.currentTurn] = (newState.skips[g.state.currentTurn] || 0) + 1;
  }
  await tod2AdvanceRound(newState);
}

async function tod2AdvanceRound(newState) {
  const g = state.activeGame;
  const nextRound = (newState.round || 0) + 1;
  if (nextRound >= (newState.totalRounds || 10)) {
    // Keep game active (no ended_at) so renderTOD2 shows the end screen
    await sb.from('game_sessions')
      .update({ phase: 'end', state: Object.assign({}, newState, { phase: 'end' }) })
      .eq('id', g.id);
    triggerInterGameGlow();
    return;
  }
  const newCurrentTurn = newState.chooser;
  const newChooser = newState.currentTurn;
  await sb.from('game_sessions')
    .update({
      phase: 'chooser_picks',
      state: Object.assign({}, newState, {
        round: nextRound,
        currentTurn: newCurrentTurn,
        chooser: newChooser,
        choice: null,
        prompt: null,
        promptIndex: null,
        completedBy: null,
        judgedBy: null,
        phase: 'chooser_picks'
      })
    })
    .eq('id', g.id);
}

function renderTODEnd(gs, iAmCurrentTurn, iAmChooser, myId, partnerName, myName) {

    '</div>' +
    '</div>';

  document.getElementById('tod2PlayAgain').addEventListener('click', function() {
    const g = state.activeGame;
    if (g) sb.from('game_sessions').update({ ended_at: new Date().toISOString() }).eq('id', g.id);
    startGame('tod', gs.totalRounds);
  });
  document.getElementById('tod2BackLobby').addEventListener('click', async function() {
    const g = state.activeGame;
    if (g) await sb.from('game_sessions').update({ ended_at: new Date().toISOString() }).eq('id', g.id);
    teardownFS();
    state.activeGame = null;
    renderRoom();
  });
}

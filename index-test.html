<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>between & together</title>
<meta name="theme-color" content="#0A0A12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0A12;--bg-soft:#14141F;--bg-card:#1A1A28;--bg-card-hover:#20202F;
  --text:#F5F0E5;--text-soft:#9994A0;--text-faint:#5A5563;
  --mint:#7FFFC4;--mint-soft:#5BE3A8;--mint-deep:#2EA876;--mint-glow:rgba(127,255,196,0.25);
  --coral:#FF8C64;--coral-deep:#CC6040;--warn:#FF6B6B;--warn-deep:#CC4444;
}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:'Bricolage Grotesque',system-ui,sans-serif;font-size:16px;line-height:1.4;-webkit-font-smoothing:antialiased;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:200;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.glow{position:fixed;border-radius:50%;pointer-events:none;z-index:1;filter:blur(80px)}
.glow-1{width:500px;height:500px;top:30%;left:50%;transform:translate(-50%,-50%);background:var(--mint);opacity:.08;animation:glowPulse 8s ease-in-out infinite}
.glow-2{width:300px;height:300px;bottom:-100px;left:-100px;background:var(--mint);opacity:.05;animation:glowPulse2 12s ease-in-out infinite}
@keyframes glowPulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.15)}}
@keyframes glowPulse2{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.particles{position:fixed;inset:0;pointer-events:none;z-index:2}
.particle{position:absolute;background:var(--mint);border-radius:50%}
@keyframes floatParticle{0%{transform:translate(0,0)}25%{transform:translate(20px,-30px)}50%{transform:translate(-15px,-60px)}75%{transform:translate(25px,-40px)}100%{transform:translate(0,0)}}
.cursor-dot,.cursor-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:9999}
.cursor-dot{width:6px;height:6px;background:var(--mint);transform:translate(-50%,-50%);box-shadow:0 0 10px var(--mint)}
.cursor-ring{width:36px;height:36px;border:1.5px solid var(--mint);transform:translate(-50%,-50%);transition:width .3s,height .3s,background .2s}
.cursor-ring.hover{width:68px;height:68px;background:var(--mint-glow)}
@media(hover:none){.cursor-dot,.cursor-ring{display:none}}
.screen{display:none;position:relative;z-index:10;min-height:100vh;min-height:100dvh;flex-direction:column;padding:24px 22px;max-width:520px;margin:0 auto}
.screen.active{display:flex}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.wordmark{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-soft);cursor:pointer;user-select:none;transition:transform .6s cubic-bezier(.34,1.56,.64,1),color .3s}
.wordmark:hover{color:var(--mint)}
.wordmark.spin{transform:rotate(360deg)}
.home-main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 0;gap:52px}
.hero{display:flex;flex-direction:column;align-items:center;text-align:center}
.hero-word{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(46px,13vw,68px);line-height:1;letter-spacing:-.045em;color:var(--text);opacity:0}
.hero-between{animation:heroIn .9s .2s forwards cubic-bezier(.16,1,.3,1)}
.hero-together{animation:heroIn .9s .6s forwards cubic-bezier(.16,1,.3,1)}
.hero-amp{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(130px,36vw,190px);line-height:.85;color:var(--mint);margin:-14px 0;cursor:pointer;user-select:none;text-shadow:0 0 60px var(--mint-glow);opacity:0;will-change:transform;animation:ampIn 1.2s .4s forwards cubic-bezier(.34,1.56,.64,1),ampBreathe 5s 1.6s infinite ease-in-out;transform-origin:center}
@keyframes heroIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes ampIn{from{opacity:0;transform:scale(.3) rotate(-180deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes ampBreathe{0%,100%{transform:scale(1) rotate(0)}50%{transform:scale(1.06) rotate(-3deg)}}
.actions{width:100%;display:flex;flex-direction:column;align-items:center;gap:28px;opacity:0;animation:fadeUp 1s 1.1s forwards}
.recent-rooms{width:100%;opacity:0;animation:fadeUp 1s 1.3s forwards}
.recent-label{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px}
.room-chips{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.room-chips::-webkit-scrollbar{display:none}
.room-chip-item{flex-shrink:0;background:var(--bg-card);border:1px solid rgba(255,255,255,.08);border-radius:100px;padding:10px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px}
.room-chip-item:hover{border-color:var(--mint)}
.room-chip-code{font-family:'Geist Mono',monospace;color:var(--mint);font-weight:500;letter-spacing:.2em;font-size:13px}
.room-chip-meta{font-family:'Geist Mono',monospace;color:var(--text-soft);font-size:10px;letter-spacing:.1em}
.btn-primary{width:100%;background:var(--mint);color:var(--bg);border:none;padding:22px 28px;font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:600;letter-spacing:-.01em;border-radius:20px;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease,background .15s;box-shadow:0 6px 0 var(--mint-deep),0 0 40px var(--mint-glow);display:inline-flex;align-items:center;justify-content:center;gap:10px;user-select:none}
.btn-primary:hover{background:var(--mint-soft)}
.btn-primary.pressing,.btn-primary:active{transform:translateY(5px);box-shadow:0 1px 0 var(--mint-deep),0 0 20px var(--mint-glow)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-primary .arrow{display:inline-block;transition:transform .25s ease;font-size:22px}
.btn-primary:hover .arrow{transform:translateX(6px)}
.btn-ghost{background:transparent;color:var(--text-soft);border:1px solid rgba(255,255,255,.12);padding:14px 22px;border-radius:14px;font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-ghost:hover{background:var(--bg-card);color:var(--text)}
.divider{width:100%;display:flex;align-items:center;gap:14px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-faint)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--text-faint);opacity:.3}
.code-slots{display:flex;gap:10px;width:100%;justify-content:center}
.code-slot{flex:1;max-width:72px;height:76px;background:var(--bg-card);border:2px solid transparent;border-radius:18px;font-family:'Geist Mono',monospace;font-size:32px;font-weight:500;color:var(--text);text-align:center;text-transform:uppercase;outline:none;transition:all .2s}
.code-slot:focus{border-color:var(--mint);background:var(--bg-soft);transform:translateY(-3px);box-shadow:0 0 24px var(--mint-glow)}
.code-slot.filled{border-color:var(--mint);background:var(--bg-soft);color:var(--mint)}
.name-main{flex:1;display:flex;flex-direction:column;justify-content:center;gap:32px}
.name-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(36px,9vw,54px);font-weight:600;letter-spacing:-.04em;line-height:1}
.name-title .mint{color:var(--mint)}
.name-sub{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-soft)}
.name-input{width:100%;background:var(--bg-card);border:2px solid transparent;border-radius:18px;padding:22px 24px;font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:500;color:var(--text);outline:none;transition:all .2s}
.name-input::placeholder{color:var(--text-faint)}
.name-input:focus{border-color:var(--mint);background:var(--bg-soft);box-shadow:0 0 24px var(--mint-glow)}
.room-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;position:relative}
.avatar-section{display:flex;align-items:center;gap:8px;z-index:1;position:relative}
.tether-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;z-index:1}
.avatar-blob{width:52px;height:52px;border-radius:60% 40% 55% 45%/55% 45% 60% 40%;animation:avatarBreathe 4s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-size:15px;font-weight:600;cursor:pointer;transition:filter .4s,box-shadow .3s;position:relative}
.avatar-blob.me{background:radial-gradient(circle at 40% 40%,var(--mint-soft),var(--mint-deep))}
.avatar-blob.them{background:radial-gradient(circle at 40% 40%,var(--coral),var(--coral-deep))}
.avatar-blob.offline{filter:saturate(.2) brightness(.7)}
.avatar-blob .pdot{position:absolute;bottom:2px;right:2px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);background:var(--text-faint)}
.avatar-blob .pdot.online{background:var(--mint);box-shadow:0 0 6px var(--mint);animation:blink 2s ease-in-out infinite}
.avatar-name{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-soft);max-width:60px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@keyframes avatarBreathe{0%,100%{border-radius:60% 40% 55% 45%/55% 45% 60% 40%;transform:scale(1)}50%{border-radius:45% 55% 40% 60%/40% 60% 45% 55%;transform:scale(1.04)}}
@keyframes avatarPulse{0%,100%{box-shadow:0 0 0 0 var(--mint-glow)}50%{box-shadow:0 0 0 16px transparent}}
.avatar-blob.pulsing{animation:avatarBreathe 4s ease-in-out infinite,avatarPulse .7s ease-out}
.room-code-tag{display:inline-flex;align-items:center;gap:10px;background:var(--bg-card);padding:10px 16px;border-radius:100px;cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,.08)}
.room-code-tag:hover{border-color:var(--mint)}
.room-code-label{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-faint)}
.room-code-value{font-family:'Geist Mono',monospace;font-size:18px;font-weight:500;letter-spacing:.3em;color:var(--mint)}
#gameOverlay{position:fixed;inset:0;z-index:20;background:var(--bg);transform:translateY(100%);transition:transform 400ms cubic-bezier(.175,.885,.32,1.275);overflow-y:auto;display:flex;flex-direction:column}
#gameOverlay.active{transform:translateY(0)}
#screen-room.game-active{transform:scale(.95) translateY(-10px);filter:blur(3px);transition:all 400ms ease}
.overlay-inner{flex:1;display:flex;flex-direction:column;padding:24px 22px;max-width:520px;margin:0 auto;width:100%;min-height:100vh;min-height:100dvh}
.hub-main{flex:1;display:flex;flex-direction:column;gap:18px}
.hub-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(36px,10vw,52px);font-weight:600;letter-spacing:-.04em;line-height:1}
.hub-title .mint{color:var(--mint)}
.hub-waiting{background:var(--bg-card);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:22px;display:flex;flex-direction:column;gap:10px}
.wait-label{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--mint);display:inline-flex;align-items:center;gap:8px}
.wait-label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint);animation:blink 2s ease-in-out infinite}
.wait-line{font-size:16px;line-height:1.45;color:var(--text)}
.wait-tip{font-size:13px;color:var(--text-soft)}
.games-list{display:flex;flex-direction:column;gap:14px}
.game-card{background:var(--bg-card);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:22px;text-align:left;width:100%;font-family:inherit;color:inherit;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden;transition:border-color .2s;cursor:pointer;user-select:none}
.game-card::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 100% 0%,var(--mint-glow),transparent 50%);opacity:0;transition:opacity .3s;pointer-events:none}
.game-card:hover,.game-card:hover::after{border-color:var(--mint)}
.game-card:hover::after{opacity:1}
.game-card.pressing{transform:scale(.97);box-shadow:0 2px 0 rgba(0,0,0,.5)}
.game-card.is-disabled{opacity:.45}
.game-card-title{font-size:24px;font-weight:600;letter-spacing:-.025em;line-height:1.1}
.game-card-desc{font-size:14px;color:var(--text-soft);line-height:1.4}
.round-picker{display:flex;gap:8px;margin-top:12px}
.round-chip{flex:1;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);color:var(--text);padding:12px 6px;border-radius:14px;font-family:'Bricolage Grotesque',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.round-chip:hover:not(:disabled){background:rgba(127,255,196,.08);border-color:var(--mint);color:var(--mint);transform:translateY(-2px)}
.round-chip:disabled{opacity:.5;cursor:not-allowed}
.round-chip-custom{border-style:dashed;font-size:11px}
.wyr-split{position:relative;flex:1;display:flex;flex-direction:column;border-radius:22px;overflow:hidden;min-height:400px}
.wyr-zone{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;padding:24px;transition:background .2s,box-shadow .2s}
.wyr-zone-a{background:rgba(127,255,196,.05);border-bottom:1px solid rgba(255,255,255,.06)}
.wyr-zone-b{background:rgba(255,140,100,.05)}
.wyr-zone.picked-you{background:rgba(127,255,196,.18);box-shadow:inset 0 0 40px var(--mint-glow)}
.wyr-zone.picked-them{background:rgba(255,140,100,.18)}
.wyr-zone.picked-both{background:rgba(127,255,196,.25);box-shadow:inset 0 0 60px var(--mint-glow)}
.wyr-option-text{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(20px,5vw,26px);font-weight:500;letter-spacing:-.02em;line-height:1.3;text-align:center;pointer-events:none;max-width:90%}
.wyr-option-tags{position:absolute;bottom:12px;left:0;right:0;display:flex;justify-content:center;gap:6px;min-height:20px}
.wyr-zone-label{position:absolute;top:10px;left:0;right:0;text-align:center;font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-faint);opacity:.6}
.wyr-question-pill{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;background:rgba(10,10,18,.8);backdrop-filter:blur(12px);border-radius:100px;padding:10px 20px;max-width:88%;text-align:center;font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:500;line-height:1.35;border:1px solid rgba(255,255,255,.12);white-space:normal;pointer-events:none}
.wyr-waiting-pill{text-align:center;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-soft);margin:12px 0;min-height:16px}
.blink-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--mint);margin-right:8px;vertical-align:middle;animation:blink 1.4s ease-in-out infinite}
.reveal-banner{text-align:center;padding:14px 20px;border-radius:16px;font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:600;background:var(--bg-card);border:1px solid rgba(127,255,196,.3);opacity:0;animation:bannerIn .5s .2s forwards;margin-top:8px}
.reveal-banner.match{background:rgba(127,255,196,.12);color:var(--mint);border-color:var(--mint)}
@keyframes bannerIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.scores{display:flex;gap:10px}
.score-chip{background:var(--bg-card);padding:8px 14px;border-radius:100px;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-soft);display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.06)}
.score-chip .num{color:var(--mint);font-weight:500}
.game-screen{flex:1;display:flex;flex-direction:column;gap:14px;padding-top:4px}
.game-meta-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.game-back{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-soft);background:transparent;border:none;cursor:pointer;padding:6px 0}
.game-back:hover{color:var(--mint)}
.game-round{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-faint)}
.pick-tag{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;padding:4px 9px;border-radius:100px;background:rgba(127,255,196,.15);color:var(--mint)}
.tod-theme-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;position:relative;overflow:hidden;border-radius:22px;background:var(--bg-card);padding:32px}
.tod-theme-bg{position:absolute;inset:0;opacity:.2;pointer-events:none;border-radius:22px;transition:background .5s ease}
.theme-display{text-align:center;position:relative;z-index:1}
.theme-name-big{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(36px,9vw,52px);font-weight:700;letter-spacing:-.04em;line-height:1;margin-bottom:8px;color:var(--text)}
.theme-desc{font-size:14px;color:var(--text-soft);line-height:1.45;max-width:260px;text-align:center}
.overclock-ring{width:120px;height:120px;position:relative;cursor:pointer;user-select:none;z-index:1}
.overclock-ring svg{position:absolute;inset:0;width:100%;height:100%}
.overclock-btn{position:absolute;inset:8px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.overclock-theme-name{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:600;color:var(--mint)}
.overclock-btn-label{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint)}
.hold-instruction{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-faint);z-index:1}
.stake-screen{flex:1;display:flex;flex-direction:column;justify-content:center;gap:22px}
.stake-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,7vw,38px);font-weight:600;letter-spacing:-.03em;line-height:1.15}
.stake-title .mint{color:var(--mint)}
.stake-input{width:100%;background:var(--bg-card);border:2px solid transparent;border-radius:18px;padding:20px 22px;font-family:'Bricolage Grotesque',sans-serif;font-size:19px;font-weight:500;color:var(--text);outline:none;transition:all .2s}
.stake-input::placeholder{color:var(--text-faint)}
.stake-input:focus{border-color:var(--mint);background:var(--bg-soft);box-shadow:0 0 24px var(--mint-glow)}
.stake-banner{background:rgba(127,255,196,.08);border:1px solid rgba(127,255,196,.2);border-radius:14px;padding:12px 18px;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--mint);text-align:center}
.tod-turn-banner{text-align:center;padding:20px;background:var(--bg-card);border-radius:18px;border:1px solid rgba(255,255,255,.08)}
.tod-turn-banner .who{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-soft);margin-bottom:8px}
.tod-turn-banner .what{font-size:22px;font-weight:600;letter-spacing:-.02em}
.tod-pick{display:flex;gap:14px;margin:8px 0 16px}
.tod-pick-btn{flex:1;background:var(--bg-card);border:2px solid transparent;border-radius:22px;padding:34px 20px;font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;letter-spacing:-.02em}
.tod-pick-btn:hover{background:var(--bg-card-hover);border-color:var(--mint);transform:translateY(-2px)}
.tod-prompt-box{background:var(--bg-card);border:1px solid var(--mint);border-radius:24px;padding:28px 24px;box-shadow:0 0 40px var(--mint-glow);position:relative}
.tod-prompt-tag{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--mint);margin-bottom:12px}
.tod-prompt-text{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(20px,5.5vw,26px);font-weight:500;letter-spacing:-.02em;line-height:1.3;min-height:65px}

<script>
const SUPABASE_URL='https://zfbahckiiytuebejahia.supabase.co';
const SUPABASE_KEY='sb_publishable_qQfnibwTWXmjqJalCiurEg_ayJHALxH';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,storageKey:'bt-auth'}});
const FS_BASE_TAP_WEIGHT=1.8,FS_OVERHEAT_LIMIT=7,FS_OVERHEAT_MS=1500,FS_MATCH_MS=30000,FS_BROADCAST_MS=80;
const TOD_THEMES=[
  {id:'casual',name:'Casual',desc:'light, fun, nothing too deep',color:'rgba(127,255,196,.15)',tiers:['easy','easy','fun','fun','wild','wild','wild']},
  {id:'playful',name:'Playful',desc:'more energy, more laughs, getting warmer',color:'rgba(74,158,255,.15)',tiers:['fun','fun','wild','wild','spicy','spicy','spicy']},

];

// ─── utils ───────────────────────────────────────────────
const $=s=>document.querySelector(s);
const $$=s=>Array.from(document.querySelectorAll(s));
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}
function show(id){$$('.screen').forEach(s=>s.classList.remove('active'));$('#'+id).classList.add('active')}
function toast(msg,isErr){const t=$('#toast');t.textContent=msg;t.classList.toggle('err',!!isErr);t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),2400)}
function genCode(){const c='ABCDEFGHJKMNPQRSTUVWXYZ';let r='';for(let i=0;i<4;i++)r+=c[Math.floor(Math.random()*c.length)];return r}
function partnerOf(m){return m&&state.user?m.find(x=>x.user_id!==state.user.id)||null:null}
function selfOf(m){return m&&state.user?m.find(x=>x.user_id===state.user.id)||null:null}
function timeAgo(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}

// ─── room history ─────────────────────────────────────────
function getRoomHistory(){try{return JSON.parse(localStorage.getItem('bt-room-history'))||[]}catch(e){return[]}}
function saveRoomHistory(arr){try{localStorage.setItem('bt-room-history',JSON.stringify(arr.slice(0,10)))}catch(e){}}
function rememberRoom(code,userId,partnerName,displayName){
  const arr=getRoomHistory().filter(r=>r.code!==code);
  arr.unshift({code,userId,partnerName:partnerName||'',displayName:displayName||'',lastPlayed:Date.now()});
  saveRoomHistory(arr);
}
function getRememberedRoom(code){return getRoomHistory().find(r=>r.code===code)||null}
function renderRecentRooms(){
  const arr=getRoomHistory();const wrap=$('#recentRooms');
  if(!arr.length){wrap.style.display='none';return}
  wrap.style.display='block';
  $('#roomChips').innerHTML=arr.map(r=>{
    const label=r.displayName||r.partnerName||r.code;
    return`<button class="room-chip-item" data-code="${r.code}"><span class="room-chip-code">${r.code}</span><span class="room-chip-meta">${esc(label)} · ${timeAgo(r.lastPlayed)}</span></button>`;
  }).join('');
  $$('.room-chip-item').forEach(chip=>chip.addEventListener('click',()=>startFlow({type:'join',code:chip.dataset.code})));
}

// ─── state ────────────────────────────────────────────────
const state={user:null,profile:null,pendingAction:null,room:null,presence:new Set(),activeGame:null,channels:[],fsLocal:null,wyrLastChoiceRound:-1,_wyrMoves:null};

// ─── background ───────────────────────────────────────────
(function(){
  const el=$('#particles');
  for(let i=0;i<22;i++){const p=document.createElement('div');p.className='particle';const sz=1+Math.random()*3;p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${.2+Math.random()*.4};animation:floatParticle ${20+Math.random()*30}s ${-Math.random()*30}s linear infinite`;el.appendChild(p)}
  if(window.matchMedia('(hover: hover)').matches){
    const dot=$('.cursor-dot'),ring=$('.cursor-ring');let mx=-100,my=-100,rx=-100,ry=-100;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px'});
    (function follow(){rx+=(mx-rx)*.15;ry+=(my-ry)*.15;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(follow)})();
    document.addEventListener('mouseover',e=>{if(e.target.closest('button,input,.wordmark,.hero-amp,.room-code-tag,.game-card,.wyr-zone,.avatar-blob,.round-chip'))ring.classList.add('hover');else ring.classList.remove('hover')});
  }
})();

// ─── home wiring ──────────────────────────────────────────
const slots=$$('.code-slot');
slots.forEach((slot,i)=>{
  slot.addEventListener('input',e=>{
    let v=e.target.value.toUpperCase().replace(/[^A-Z]/g,'');e.target.value=v;
    if(v){slot.classList.add('filled');if(i<slots.length-1)slots[i+1].focus();else if(slots.every(s=>s.value))startFlow({type:'join',code:slots.map(s=>s.value).join('')})}
    else slot.classList.remove('filled');
  });
  slot.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!slot.value&&i>0){slots[i-1].focus();slots[i-1].value='';slots[i-1].classList.remove('filled')}});
});
$('#createBtn').addEventListener('pointerdown',function(){this.classList.add('pressing')});
$('#createBtn').addEventListener('pointerup',function(){this.classList.remove('pressing');startFlow({type:'create'})});
$('#createBtn').addEventListener('pointerleave',function(){this.classList.remove('pressing')});
let _wTaps=0;
$('#wordmark').addEventListener('click',()=>{_wTaps++;if(_wTaps>=5){$('#wordmark').classList.add('spin');setTimeout(()=>$('#wordmark').classList.remove('spin'),600);_wTaps=0}});
$('#ampChar').addEventListener('click',()=>{const a=$('#ampChar');const d=Math.random()*720-360;a.style.transition='transform .7s cubic-bezier(.34,1.56,.64,1)';a.style.transform=`scale(1.1) rotate(${d}deg)`;setTimeout(()=>{a.style.transform='';setTimeout(()=>a.style.transition='',700)},700)});

// ─── prompt memory ────────────────────────────────────────
function _pmKey(code){return`bt-prompts-${code}`}
function getUsedIdxs(code,bucket){try{const r=JSON.parse(localStorage.getItem(_pmKey(code)));if(!r)return[];let c=r;for(const k of bucket.split('.')){c=c&&c[k]}return Array.isArray(c)?c:[]}catch(e){return[]}}
function addUsedIdxs(code,bucket,idxs){try{const raw=localStorage.getItem(_pmKey(code));const obj=raw?JSON.parse(raw):{};const p=bucket.split('.');let c=obj;for(let i=0;i<p.length-1;i++){if(!c[p[i]])c[p[i]]={};c=c[p[i]]}const last=p[p.length-1];c[last]=Array.from(new Set([...(Array.isArray(c[last])?c[last]:[]),...idxs]));localStorage.setItem(_pmKey(code),JSON.stringify(obj))}catch(e){}}
function pickFreshIdx(len,used){const av=[];for(let i=0;i<len;i++)if(!used.includes(i))av.push(i);return av.length?av[Math.floor(Math.random()*av.length)]:Math.floor(Math.random()*len)}
function pickFreshIdxs(len,n,used){let av=[];for(let i=0;i<len;i++)if(!used.includes(i))av.push(i);if(av.length<n){for(let i=0;i<len;i++)if(!av.includes(i))av.push(i)}av.sort(()=>Math.random()-.5);return av.slice(0,n)}
function pickWyrPrompts(n){if(!state.room)return WYR_PROMPTS.sort(()=>Math.random()-.5).slice(0,n);const used=getUsedIdxs(state.room.code,'wyr');const idxs=pickFreshIdxs(WYR_PROMPTS.length,n,used);addUsedIdxs(state.room.code,'wyr',idxs);return idxs.map(i=>WYR_PROMPTS[i])}
function getTODTier(theme,round){const t=TOD_THEMES.find(x=>x.id===theme)||TOD_THEMES[0];return t.tiers[Math.min(round,t.tiers.length-1)]||'spicy'}

// ─── auth ─────────────────────────────────────────────────
async function startFlow(action){
  state.pendingAction=action;
  if(action.type==='join'){const{data:room,error}=await sb.from('rooms').select('id,code').eq('code',action.code).maybeSingle();if(error||!room){toast('no room with that code',true);slots.forEach(s=>{s.value='';s.classList.remove('filled')});slots[0]&&slots[0].focus();return}}
  const{data:{user}}=await sb.auth.getUser();
  if(user){state.user=user;const{data:prof}=await sb.from('profiles').select('*').eq('id',user.id).maybeSingle();if(prof){state.profile=prof;proceedAfterAuth();return}}
  goToNameScreen();
}
function goToNameScreen(){$('#nameSub').textContent=state.pendingAction.type==='create'?'about to open a room':`joining ${state.pendingAction.code||''}`;show('screen-name');setTimeout(()=>$('#nameInput').focus(),200)}
$('#nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('#nameContinue').click()});
$('#nameContinue').addEventListener('click',async()=>{
  const name=$('#nameInput').value.trim();if(!name){toast('need a name');return}
  const btn=$('#nameContinue');btn.disabled=true;btn.innerHTML='one sec<span class="arrow">·</span>';
  try{
    let user=state.user;
    if(!user){const{data,error}=await sb.auth.signInAnonymously();if(error)throw error;user=data.user;state.user=user}
    const{data:prof,error:pErr}=await sb.from('profiles').upsert({id:user.id,display_name:name}).select('*').single();
    if(pErr)throw pErr;state.profile=prof;proceedAfterAuth();
  }catch(e){console.error(e);toast('something went wrong',true);btn.disabled=false;btn.innerHTML='continue <span class="arrow">→</span>'}
});
async function proceedAfterAuth(){state.pendingAction.type==='create'?createRoom():joinRoom(state.pendingAction.code)}

// ─── room create / join / load ────────────────────────────
async function createRoom(){
  show('screen-room');$('#hubBody').innerHTML='<div class="loading">opening a room</div>';
  let code,room,attempt=0;
  while(attempt<5){code=genCode();const{data,error}=await sb.from('rooms').insert({code,created_by:state.user.id}).select().single();if(!error){room=data;break}if(error.code!=='23505'){toast('could not open room',true);return goHome()}attempt++}
  if(!room){toast('could not open room',true);return goHome()}
  const{error:mErr}=await sb.from('room_members').insert({room_id:room.id,user_id:state.user.id,role:'host'});
  if(mErr){toast('could not open room',true);return goHome()}
  window.location.hash='/r/'+room.code;await loadRoom(room.code);
}
async function joinRoom(code){
  show('screen-room');$('#hubBody').innerHTML='<div class="loading">slipping into the room</div>';
  const mem=getRememberedRoom(code);
  const{data:room,error}=await sb.from('rooms').select('id,code').eq('code',code).maybeSingle();
  if(error||!room){
    if(mem&&mem.userId===state.user?.id){$('#hubBody').innerHTML='<div class="loading">reconnecting</div>';setTimeout(()=>joinRoom(code),3000);return}
    toast('no room with that code',true);return goHome();
  }
  const{data:existing}=await sb.from('room_members').select('user_id').eq('room_id',room.id).eq('user_id',state.user.id).maybeSingle();
  if(!existing){
    const{error:jErr}=await sb.from('room_members').insert({room_id:room.id,user_id:state.user.id,role:'guest'});
    if(jErr){
      const{data:retry}=await sb.from('room_members').select('user_id').eq('room_id',room.id).eq('user_id',state.user.id).maybeSingle();
      if(!retry){toast(jErr.message?.includes('full')?'that room is full':'could not join',true);return goHome()}
    }
  }
  window.location.hash='/r/'+room.code;await loadRoom(room.code);
}
async function loadRoom(code){
  const{data:room,error}=await sb.from('rooms').select('id,code,created_by,created_at,is_persistent,display_name').eq('code',code).maybeSingle();
  if(error||!room){
    const mem=getRememberedRoom(code);
    if(mem&&mem.userId===state.user?.id){$('#hubBody').innerHTML='<div class="loading">reconnecting</div>';setTimeout(()=>loadRoom(code),3000);return}
    toast('that room is gone',true);return goHome();
  }
  const{data:members}=await sb.from('room_members').select('user_id,role,joined_at').eq('room_id',room.id);
  const ids=(members||[]).map(m=>m.user_id);let pm={};
  if(ids.length){const{data:profs}=await sb.from('profiles').select('id,display_name').in('id',ids);(profs||[]).forEach(p=>{pm[p.id]=p.display_name})}
  state.room={...room,members:(members||[]).map(m=>({...m,display_name:pm[m.user_id]||'...'}))};
  const partner=partnerOf(state.room.members);
  if(partner&&!room.display_name&&room.created_by!==state.user.id)setTimeout(showRoomNameModal,800);
  rememberRoom(code,state.user.id,(partner?.display_name)||'',room.display_name||'');
  renderRecentRooms();
  const{data:activeGame}=await sb.from('game_sessions').select('*').eq('room_id',room.id).is('ended_at',null).maybeSingle();
  state.activeGame=activeGame||null;
  await unsubscribeAll();subscribeRoom();startPolling();startKeepAlive();renderHub();
}
function goHome(){
  state.room=null;state.activeGame=null;stopPolling();stopKeepAlive();teardownFS();unsubscribeAll();closeOverlay();
  window.location.hash='';slots.forEach(s=>{s.value='';s.classList.remove('filled')});renderRecentRooms();show('screen-home');
}
function showRoomNameModal(){$('#roomNameModal').hidden=false;$('#roomNameInput').focus()}
$('#roomNameSkip').addEventListener('click',()=>{$('#roomNameModal').hidden=true});
$('#roomNameSave').addEventListener('click',async()=>{
  const name=$('#roomNameInput').value.trim();$('#roomNameModal').hidden=true;
  if(!name||!state.room)return;
  await sb.from('rooms').update({display_name:name}).eq('id',state.room.id);
  state.room.display_name=name;const partner=partnerOf(state.room.members);
  rememberRoom(state.room.code,state.user.id,(partner?.display_name)||'',name);renderRecentRooms();
});

// ─── overlay ──────────────────────────────────────────────
function openOverlay(){$('#gameOverlay').classList.add('active');$('#screen-room').classList.add('game-active')}
function closeOverlay(){$('#gameOverlay').classList.remove('active');$('#screen-room').classList.remove('game-active');$('#gameContent').innerHTML='';const v=$('#todVig');if(v)v.remove()}

// ─── realtime ─────────────────────────────────────────────
async function unsubscribeAll(){for(const ch of state.channels){try{await sb.removeChannel(ch)}catch(e){}}state.channels=[];state.presence=new Set()}
function subscribeRoom(){
  if(!state.room)return;
  const rid=state.room.id;
  const memCh=sb.channel(`rm:${rid}:members`).on('postgres_changes',{event:'*',schema:'public',table:'room_members',filter:`room_id=eq.${rid}`},async()=>{
    const{data:members}=await sb.from('room_members').select('user_id,role,joined_at').eq('room_id',rid);
    const ids=(members||[]).map(m=>m.user_id);const pm={};(state.room.members||[]).forEach(m=>pm[m.user_id]=m.display_name);
    const miss=ids.filter(id=>!pm[id]);
    if(miss.length){const{data:profs}=await sb.from('profiles').select('id,display_name').in('id',miss);(profs||[]).forEach(p=>{pm[p.id]=p.display_name})}
    state.room.members=(members||[]).map(m=>({...m,display_name:pm[m.user_id]||'...'}));renderHub();renderRoomBar();
  }).subscribe();
  state.channels.push(memCh);
  const gameCh=sb.channel(`rm:${rid}:games`).on('postgres_changes',{event:'*',schema:'public',table:'game_sessions',filter:`room_id=eq.${rid}`},async(payload)=>{
    if(payload.eventType==='DELETE'){if(state.activeGame?.id===payload.old.id){state.activeGame=null;closeOverlay();renderHub()}return}
    const row=payload.new;
    if(row.ended_at){if(state.activeGame?.id===row.id){state.activeGame=row;renderGameContent()}return}
    if(!state.activeGame||state.activeGame.version<=row.version){state.activeGame=row;renderGameContent()}
  }).subscribe();
  state.channels.push(gameCh);
  const wyrCh=sb.channel(`rm:${rid}:wyr`).on('postgres_changes',{event:'INSERT',schema:'public',table:'wyr_moves'},async(payload)=>{
    if(state.activeGame?.game_type!=='wyr'||payload.new.game_id!==state.activeGame.id)return;
    await refreshWyrRound();
  }).subscribe();
  state.channels.push(wyrCh);
  const presCh=sb.channel(`rm:${rid}:presence`,{config:{presence:{key:state.user.id}}});
  presCh.on('presence',{event:'sync'},()=>{state.presence=new Set(Object.keys(presCh.presenceState()));renderRoomBar()})
    .on('broadcast',{event:'emoji'},({payload})=>{if(payload.user_id!==state.user.id)floatEmoji(payload.em)})
    .on('broadcast',{event:'fs_ready'},({payload})=>{if(payload.user_id!==state.user.id){_walkPartnerReady=true;checkBothFSReady()}})
    .subscribe(async(s)=>{if(s==='SUBSCRIBED')await presCh.track({online_at:new Date().toISOString()})});
  state.channels.push(presCh);
}

// ─── polling / keep-alive ─────────────────────────────────
let _pollTimer=null,_kaTimer=null;
function startPolling(){if(_pollTimer)clearInterval(_pollTimer);_pollTimer=setInterval(syncRoomState,4000)}
function stopPolling(){if(_pollTimer){clearInterval(_pollTimer);_pollTimer=null}}
function startKeepAlive(){stopKeepAlive();_kaTimer=setInterval(async()=>{if(!state.room||!partnerOf(state.room.members))return;try{await sb.from('rooms').update({last_active_at:new Date().toISOString()}).eq('id',state.room.id)}catch(e){}},55000)}
function stopKeepAlive(){if(_kaTimer){clearInterval(_kaTimer);_kaTimer=null}}
async function ensureChannelsAlive(){if(!state.room)return;const dead=state.channels.some(ch=>['closed','errored','leaving','left'].includes(ch.state));if(dead){await unsubscribeAll();subscribeRoom()}}
async function syncRoomState(){
  if(!state.room)return;
  try{
    const{data:game}=await sb.from('game_sessions').select('*').eq('room_id',state.room.id).is('ended_at',null).maybeSingle();
    if(!game&&state.activeGame&&!state.activeGame.ended_at){state.activeGame=null;renderGameContent();return}
    if(game){if(!state.activeGame||game.id!==state.activeGame.id||game.version>state.activeGame.version){state.activeGame=game;renderGameContent()}if(game.game_type==='wyr')await refreshWyrRound()}
    const{data:members}=await sb.from('room_members').select('user_id,role,joined_at').eq('room_id',state.room.id);
    if(members){const ids=members.map(m=>m.user_id);const pm={};(state.room.members||[]).forEach(m=>pm[m.user_id]=m.display_name);const miss=ids.filter(id=>!pm[id]);if(miss.length){const{data:profs}=await sb.from('profiles').select('id,display_name').in('id',miss);(profs||[]).forEach(p=>{pm[p.id]=p.display_name})}const before=JSON.stringify(state.room.members.map(m=>m.user_id).sort());state.room.members=members.map(m=>({...m,display_name:pm[m.user_id]||'...'}));if(before!==JSON.stringify(ids.sort())){renderHub();renderRoomBar()}}
  }catch(e){console.debug('sync err',e)}
}
document.addEventListener('visibilitychange',async()=>{
  if(document.visibilityState!=='visible'||!state.room)return;
  try{await sb.auth.getSession()}catch(e){}
  await ensureChannelsAlive();syncRoomState();
});
window.addEventListener('online',async()=>{if(!state.room)return;try{await sb.auth.getSession()}catch(e){}await ensureChannelsAlive();syncRoomState()});

// ─── hub ──────────────────────────────────────────────────

// ─── game start ───────────────────────────────────────────
async function startGame(type,rounds){
  const me=selfOf(state.room.members);const partner=partnerOf(state.room.members);if(!partner)return;
  let initialState,initialPhase,initialTurn=null;
  if(type==='wyr'){
    const n=rounds||7;initialState={round:0,prompts:pickWyrPrompts(n),total_rounds:n,scores:{same:0,different:0},history:[]};initialPhase='pick';
  }else if(type==='tod'){
    const n=rounds||6;
    initialState={theme:null,round:0,total_rounds:n,picker_id:state.user.id,pick:null,prompt_idx:null,judgment:null,
      used:{easy:{truth:[],dare:[]},fun:{truth:[],dare:[]},wild:{truth:[],dare:[]},spicy:{truth:[],dare:[]}},
      scores:{[me.user_id]:0,[partner.user_id]:0},escalation:1,stake:null};
    initialPhase='theme';initialTurn=state.user.id;
  }else{
    const n=rounds||1;initialState={total_rounds:n,match_round:0,scores:{[me.user_id]:0,[partner.user_id]:0},match_winner:null};initialPhase='walkthrough';
  }
  const{data,error}=await sb.from('game_sessions').insert({room_id:state.room.id,game_type:type,phase:initialPhase,state:initialState,current_turn_user_id:initialTurn}).select().single();
  if(error){toast('could not start',true);return}
  state.activeGame=data;state.wyrLastChoiceRound=-1;state._wyrMoves=null;teardownFS();openOverlay();renderGameContent();
}

// ─── game router ──────────────────────────────────────────
function renderGameContent(){
  if(!state.activeGame)return;
  const g=state.activeGame;
  if(g.ended_at){renderEndCard();return}
  if(g.game_type==='wyr')renderWYR();
  else if(g.game_type==='tod')renderTOD();
  else if(g.game_type==='fs')renderFS();
}

// ─── WYR ──────────────────────────────────────────────────
async function refreshWyrRound(){
  if(!state.activeGame||state.activeGame.game_type!=='wyr')return;
  const round=state.activeGame.state.round;
  const{data:moves}=await sb.from('wyr_moves').select('user_id,choice,round').eq('game_id',state.activeGame.id).eq('round',round);
  state._wyrMoves=moves||[];
  if(state.activeGame.phase==='pick'&&(moves||[]).length>=2){
    const ns=JSON.parse(JSON.stringify(state.activeGame.state));
    const a=moves[0],b=moves[1];const match=a.choice===b.choice;
    ns.scores={same:(ns.scores.same||0)+(match?1:0),different:(ns.scores.different||0)+(match?0:1)};
    ns.history.push({prompt:ns.prompts[round],choices:{[a.user_id]:a.choice,[b.user_id]:b.choice}});
    const{data,error}=await sb.from('game_sessions').update({state:ns,phase:'reveal'}).eq('id',state.activeGame.id).eq('version',state.activeGame.version).eq('phase','pick').select();
    if(!error&&data?.length>0)state.activeGame=data[0];
  }
  renderWYR();
}

async function makeWyrChoice(choice,e){
  if(e?.cancelable)e.preventDefault();

  if(state.wyrLastChoiceRound===round)return;state.wyrLastChoiceRound=round;

  if(error&&error.code!=='23505'){toast('could not register',true);state.wyrLastChoiceRound=-1;return}
  await refreshWyrRound();

async function advanceWyrRound(){
  const g=state.activeGame;const next=g.state.round+1;
  if(next>=g.state.prompts.length){await sb.from('game_sessions').update({ended_at:new Date().toISOString(),phase:'ended'}).eq('id',g.id);return}
  await sb.from('game_sessions').update({state:{...g.state,round:next},phase:'pick'}).eq('id',g.id).eq('version',g.version);
  state._wyrMoves=[];state.wyrLastChoiceRound=-1;
}

  if(verdict==='did'){const pts=1*(ns.escalation||1);ns.scores[g.state.picker_id]=(ns.scores[g.state.picker_id]||0)+pts;ns.escalation=1}
  else{ns.escalation=Math.min((ns.escalation||1)*2,16)}
  await sb.from('game_sessions').update({state:ns,phase:'result'}).eq('id',g.id).eq('version',g.version);
  if(verdict==='didnt'){const f=document.createElement('div');f.className='penalty-flash';f.innerHTML=`<div style="font-size:22px;font-weight:700;font-family:'Bricolage Grotesque',sans-serif;color:var(--warn)">🔥 penalty doubled</div>`;document.body.appendChild(f);setTimeout(()=>f.remove(),800)}
}
function renderTODResult(){

    <div class="reveal-banner${did?' match':''}"> ${did?'✦ point scored':'couldn\'t do it'}</div>
    ${g.state.escalation>1?`<div class="escalation-badge" style="margin-top:8px">🔥 next penalty ×${g.state.escalation}</div>`:''}

async function advanceTodRound(){
  const g=state.activeGame;const next=g.state.round+1;const total=g.state.total_rounds||6;
  if(next>=total){await sb.from('game_sessions').update({ended_at:new Date().toISOString(),phase:'ended'}).eq('id',g.id);return}
  const partner=partnerOf(state.room.members);
  const newPicker=g.state.picker_id===state.user.id?partner?.user_id:state.user.id;
  const ns={...g.state,round:next,picker_id:newPicker,pick:null,prompt_idx:null,judgment:null};
  await sb.from('game_sessions').update({state:ns,phase:'pick',current_turn_user_id:newPicker}).eq('id',g.id).eq('version',g.version);
}
function sendEmoji(em){floatEmoji(em);const pCh=state.channels.find(c=>c.topic?.includes('presence'));pCh?.send({type:'broadcast',event:'emoji',payload:{em,user_id:state.user.id}}).catch(()=>{})}
function floatEmoji(em){const el=document.createElement('div');el.className='emoji-float';el.textContent=em;el.style.cssText=`left:${20+Math.random()*60}%;bottom:80px;--dx:${(Math.random()-.5)*60}px`;document.body.appendChild(el);setTimeout(()=>el.remove(),1500)}

// ─── Finger Smash ─────────────────────────────────────────
let _fsCh=null,_fsBt=null,_fsCt=null,_fsMt=null,_fsPwt=null;
let _walkFrame=0,_walkReady=false,_walkPartnerReady=false,_walkAutoTimer=null;
const FS_WALK=[
  {icon:'👆',text:'tap as fast as you can',sub:'every tap pushes the line toward their side'},
  {icon:'💣',text:'watch out for the bomb',sub:'tap it and you overheat — keep your eyes open'},
  {icon:'⚡🧊',text:'powerups change everything',sub:'turbo doubles your taps · freeze stops them cold'},
];
function resetFSLocal(){state.fsLocal={phase:'countdown',countdown:3,myCount:0,opponentCount:0,myTaps:[],overheated:false,frozen:false,linePos:50,roundWinner:null,endedLocally:false,turboRemaining:0,powerups:[],_pwId:0}}
function teardownFS(){
  if(_fsCh){try{sb.removeChannel(_fsCh)}catch(e){}_fsCh=null}
  [_fsBt,_fsCt,_fsMt,_fsPwt].forEach(t=>{if(t){clearInterval(t);clearTimeout(t)}});
  _fsBt=_fsCt=_fsMt=_fsPwt=null;_fsRoundKey=null;state.fsLocal=null;
}
let _fsRoundKey=null;
function subscribeFSChannel(){
  if(!state.activeGame||state.activeGame.game_type!=='fs')return;
  if(_fsCh){try{sb.removeChannel(_fsCh)}catch(e){}_fsCh=null}
  _fsCh=sb.channel(`fs:${state.activeGame.id}`)
    .on('broadcast',{event:'count'},({payload})=>{
      if(!state.fsLocal||state.fsLocal.phase!=='playing'||payload.user_id===state.user.id)return;
      if(payload.round!==state.activeGame.state.match_round)return;
      state.fsLocal.opponentCount=Math.max(state.fsLocal.opponentCount,payload.count);
      computeFSLine();paintFS();
    })
    .on('broadcast',{event:'won'},({payload})=>{
      if(!state.fsLocal||state.fsLocal.endedLocally||payload.round!==state.activeGame.state.match_round)return;
      state.fsLocal.endedLocally=true;state.fsLocal.roundWinner=payload.winner_id;state.fsLocal.phase='over';
      stopFSTimers();hostRecordFSWin(payload.winner_id);renderGameContent();
    })
    .on('broadcast',{event:'sabotage'},({payload})=>{
      if(payload.target_id!==state.user.id||!state.fsLocal||state.fsLocal.frozen)return;
      state.fsLocal.frozen=true;paintFS();setTimeout(()=>{if(state.fsLocal)state.fsLocal.frozen=false;paintFS()},2000);
    })
    .subscribe();
}
function stopFSTimers(){[_fsBt,_fsCt,_fsMt,_fsPwt].forEach(t=>{clearInterval(t);clearTimeout(t)});_fsBt=_fsCt=_fsMt=_fsPwt=null}
function computeFSLine(){
  if(!state.fsLocal)return;
  const delta=state.fsLocal.myCount-state.fsLocal.opponentCount;
  state.fsLocal.linePos=Math.max(0,Math.min(100,50+delta*FS_BASE_TAP_WEIGHT));
  if(state.fsLocal.phase!=='playing'||state.fsLocal.endedLocally)return;
  const partner=partnerOf(state.room.members);
  if(state.fsLocal.linePos>=100)declareFSWin(state.user.id);
  else if(state.fsLocal.linePos<=0&&partner)declareFSWin(partner.user_id);
}
function declareFSWin(wid){
  if(state.fsLocal.endedLocally)return;
  state.fsLocal.endedLocally=true;state.fsLocal.roundWinner=wid;state.fsLocal.phase='over';
  stopFSTimers();
  _fsCh?.send({type:'broadcast',event:'won',payload:{winner_id:wid,round:state.activeGame.state.match_round,ts:Date.now()}}).catch(()=>{});
  hostRecordFSWin(wid);renderGameContent();
}
async function hostRecordFSWin(wid){
  if(!state.room||state.room.created_by!==state.user.id)return;
  const g=state.activeGame;
  const ns=JSON.parse(JSON.stringify(g.state));ns.scores[wid]=(ns.scores[wid]||0)+1;
  const needed=Math.ceil(ns.total_rounds/2);const ended=ns.scores[wid]>=needed;
  const upd={state:ns,phase:ended?'ended':'round_done'};if(ended){ns.match_winner=wid;upd.ended_at=new Date().toISOString()}
  await sb.from('game_sessions').update(upd).eq('id',g.id).eq('version',g.version);
}
function renderFS(){
  const g=state.activeGame;const phase=g.phase;
  if(phase==='walkthrough'){
    if(!_fsCh)subscribeFSChannel();
    renderFSWalk();return;
  }
  if(phase==='round_done'){renderFSRoundDone();return}
  const rk=`${g.id}:${g.state.match_round}`;
  if(_fsRoundKey!==rk){_fsRoundKey=rk;stopFSTimers();resetFSLocal();if(!_fsCh)subscribeFSChannel();beginFSCountdown()}
  renderFSMainScreen();
}
function renderFSWalk(){
  const gc=$('#gameContent');const frame=FS_WALK[_walkFrame];
  gc.innerHTML=`<div class="game-screen" style="position:relative;min-height:400px">
    <div class="game-meta-bar"><button class="game-back" id="gbk">← hub</button><div></div></div>
    <div class="fs-walkthrough">
      <div class="fs-walk-icon">${frame.icon}</div>
      <div class="fs-walk-text">${frame.text}</div>
      <div class="fs-walk-sub">${frame.sub}</div>
      <div class="fs-walk-dots">${FS_WALK.map((_,i)=>`<div class="fs-walk-dot${i===_walkFrame?' active':''}"></div>`).join('')}</div>
      <button class="${_walkReady?'fs-ready-btn ready':'fs-ready-btn'}" id="fsRdy">${_walkReady?'✓ ready — waiting for them':'tap when ready →'}</button>
    </div>
  </div>`;
  $('#gbk')?.addEventListener('click',confirmEndGame);
  clearTimeout(_walkAutoTimer);_walkAutoTimer=setTimeout(()=>{if(_walkFrame<FS_WALK.length-1){_walkFrame++;renderFSWalk()}},1800);
  $('#fsRdy').addEventListener('click',()=>{
    if(_walkReady)return;_walkReady=true;clearTimeout(_walkAutoTimer);
    localStorage.setItem('bt-fs-seen','1');
    const pCh=state.channels.find(c=>c.topic?.includes('presence'));
    pCh?.send({type:'broadcast',event:'fs_ready',payload:{user_id:state.user.id}}).catch(()=>{});
    renderFSWalk();checkBothFSReady();
  });
}
function checkBothFSReady(){if(_walkReady&&_walkPartnerReady)sb.from('game_sessions').update({phase:'countdown'}).eq('id',state.activeGame.id).eq('version',state.activeGame.version)}
function beginFSCountdown(){
  if(!state.fsLocal)resetFSLocal();state.fsLocal.phase='countdown';state.fsLocal.countdown=3;renderFSMainScreen();
  _fsCt=setInterval(()=>{if(!state.fsLocal){clearInterval(_fsCt);return}state.fsLocal.countdown--;if(state.fsLocal.countdown<=0){clearInterval(_fsCt);_fsCt=null;beginFSMatch()}else renderFSMainScreen()},1000);
}
function beginFSMatch(){
  if(!state.fsLocal)return;state.fsLocal.phase='playing';renderFSMainScreen();
  _fsBt=setInterval(()=>{if(!_fsCh||!state.fsLocal||state.fsLocal.phase!=='playing')return;_fsCh.send({type:'broadcast',event:'count',payload:{user_id:state.user.id,count:state.fsLocal.myCount,round:state.activeGame.state.match_round}}).catch(()=>{})},FS_BROADCAST_MS);
  spawnPwrLoop();
  _fsMt=setTimeout(()=>{
    if(!state.fsLocal||state.fsLocal.phase!=='playing'||state.fsLocal.endedLocally)return;
    const partner=partnerOf(state.room.members);
    declareFSWin(state.fsLocal.myCount>=state.fsLocal.opponentCount?state.user.id:(partner?.user_id||state.user.id));
  },FS_MATCH_MS);
}
function spawnPwrLoop(){
  if(_fsPwt)clearInterval(_fsPwt);
  function trySpawn(){
    if(!state.fsLocal||state.fsLocal.phase!=='playing')return;
    if(state.fsLocal.powerups.filter(p=>p.active).length>=2)return;
    const tapArea=$('#fsTA');if(!tapArea)return;
    const rect=tapArea.getBoundingClientRect();const m=64,bw=56;
    const x=m+Math.random()*(rect.width-m*2-bw);const y=m+Math.random()*(rect.height-m*2-bw);
    const types=['bomb','turbo','freeze'];const type=types[Math.floor(Math.random()*types.length)];
    const id=state.fsLocal._pwId++;
    const el=document.createElement('div');el.className=`fs-powerup ${type}`;
    el.style.cssText=`left:${x}px;top:${y}px`;
    el.innerHTML=type==='bomb'?'💣':type==='turbo'?'⚡':'❄';el.id=`pw${id}`;
    tapArea.appendChild(el);
    const pu={id,type,x:x+28,y:y+28,active:true,el};
    state.fsLocal.powerups.push(pu);
    setTimeout(()=>{if(pu.active){pu.active=false;el.style.opacity='0';setTimeout(()=>el.remove(),300);state.fsLocal.powerups=state.fsLocal.powerups.filter(p=>p.id!==id)}},3000);
  }
  _fsPwt=setInterval(trySpawn,Math.random()*4000+6000);setTimeout(trySpawn,2500);
}
function hitPowerup(cx,cy){
  if(!state.fsLocal)return null;
  for(const pu of state.fsLocal.powerups){if(!pu.active)continue;const dx=cx-pu.x,dy=cy-pu.y;if(Math.sqrt(dx*dx+dy*dy)<38)return pu}return null;
}
function onFSTap(cx,cy){
  if(!state.fsLocal||state.fsLocal.phase!=='playing'||state.fsLocal.endedLocally)return;
  const pu=hitPowerup(cx,cy);
  if(pu){
    pu.active=false;pu.el.remove();state.fsLocal.powerups=state.fsLocal.powerups.filter(p=>p.id!==pu.id);
    if(pu.type==='bomb'){if(!state.fsLocal.overheated){state.fsLocal.overheated=true;paintFS();navigator.vibrate?.([50,100,50]);setTimeout(()=>{if(state.fsLocal)state.fsLocal.overheated=false;paintFS()},1500)}}
    else if(pu.type==='turbo'){state.fsLocal.turboRemaining=5}
    else{const p=partnerOf(state.room.members);p&&_fsCh?.send({type:'broadcast',event:'sabotage',payload:{type:'freeze',target_id:p.user_id}}).catch(()=>{})}
    return;
  }
  if(state.fsLocal.frozen||state.fsLocal.overheated)return;
  const now=Date.now();
  state.fsLocal.myTaps=state.fsLocal.myTaps.filter(t=>now-t<1000);state.fsLocal.myTaps.push(now);
  if(state.fsLocal.myTaps.length>FS_OVERHEAT_LIMIT){if(!state.fsLocal.overheated){state.fsLocal.overheated=true;paintFS();setTimeout(()=>{if(state.fsLocal){state.fsLocal.overheated=false;state.fsLocal.myTaps=[]}paintFS()},FS_OVERHEAT_MS)}return}
  const bonus=state.fsLocal.turboRemaining>0?2:1;
  state.fsLocal.myCount+=bonus;
  if(state.fsLocal.turboRemaining>0){state.fsLocal.turboRemaining--;if(state.fsLocal.turboRemaining===0){$('#fsTurbo')?.remove()}}
  computeFSLine();paintFS();
}
function renderFSMainScreen(){
  const gc=$('#gameContent');const g=state.activeGame;const me=selfOf(state.room.members);const partner=partnerOf(state.room.members);
  const myS=g.state.scores[me.user_id]||0;const thS=partner?(g.state.scores[partner.user_id]||0):0;
  gc.innerHTML=`<div class="game-screen fs-wrap">
    <div class="fs-top"><button class="game-back" id="gbk">← hub</button><div class="fs-round-pill">round ${(g.state.match_round||0)+1}/${g.state.total_rounds}</div></div>
    <div class="fs-counters">
      <div class="fs-counter fs-counter-me"><div class="fs-counter-label">you</div><div class="fs-counter-num" id="fsMy">${state.fsLocal?.myCount||0}</div></div>
      <div class="fs-counter fs-counter-them"><div class="fs-counter-label">${esc((partner?.display_name||'them').slice(0,10))}</div><div class="fs-counter-num" id="fsTheir">${state.fsLocal?.opponentCount||0}</div></div>
    </div>
    <div class="fs-tap-area" id="fsTA">
      <div class="fs-string-wrap" id="fsSW" style="bottom:${state.fsLocal?.linePos||50}%"><div class="fs-string" id="fsStr"></div></div>
      <div class="fs-tap-hint" id="fsHint">tap anywhere</div>
      <div class="fs-overheat" id="fsOvh">overheated 🔥</div>
      <div class="fs-frozen" id="fsFrz">frozen ❄️</div>
      <div class="fs-countdown" id="fsCd"></div>
    </div>
  </div>`;
  $('#gbk')?.addEventListener('click',confirmEndGame);
  const ta=$('#fsTA');let _lft=0;
  ta.addEventListener('touchstart',e=>{e.preventDefault();_lft=Date.now();const t=e.touches[0];onFSTap(t.clientX,t.clientY)},{passive:false});
  ta.addEventListener('mousedown',e=>{if(Date.now()-_lft<600)return;onFSTap(e.clientX,e.clientY)});
  paintFS();
}
function paintFS(){
  const my=$('#fsMy'),their=$('#fsTheir'),sw=$('#fsSW'),str=$('#fsStr'),hint=$('#fsHint'),ovh=$('#fsOvh'),frz=$('#fsFrz'),cd=$('#fsCd');
  if(!my||!state.fsLocal)return;
  my.textContent=state.fsLocal.myCount;their.textContent=state.fsLocal.opponentCount;
  // Tension string physics
  const lp=state.fsLocal.linePos;
  if(sw)sw.style.bottom=lp+'%';
  if(str){
    const dev=Math.abs(lp/100-.5)*2;const h=4+dev*10;
    str.style.height=h+'px';str.style.borderRadius=lp>50?`${Math.floor(dev*60)}% ${Math.floor(dev*60)}% 0 0`:`0 0 ${Math.floor(dev*60)}% ${Math.floor(dev*60)}%`;
    if(lp>58)str.style.background=`color-mix(in srgb, var(--mint) ${Math.floor(dev*100)}%, var(--text))`;
    else if(lp<42)str.style.background=`color-mix(in srgb, var(--warn) ${Math.floor(dev*100)}%, var(--text))`;
    else str.style.background='var(--text)';
  }
  const ta=$('#fsTA');
  if(ta){const lf=Math.max(0,(50-lp)/50);ta.style.boxShadow=`inset 0 0 ${Math.floor(lf*80)}px rgba(255,107,107,${(lf*.45).toFixed(2)})`}
  if(state.fsLocal.phase==='countdown'){cd&&(cd.style.display='flex');if(cd)cd.textContent=state.fsLocal.countdown>0?state.fsLocal.countdown:'go!';hint&&(hint.style.display='none');ovh&&(ovh.style.display='none')}
  else if(state.fsLocal.phase==='playing'){cd&&(cd.style.display='none');hint&&(hint.style.display=state.fsLocal.myCount===0?'block':'none');ovh&&(ovh.style.display=state.fsLocal.overheated?'flex':'none');frz&&(frz.style.display=state.fsLocal.frozen?'flex':'none')}
  else{cd&&(cd.style.display='none');hint&&(hint.style.display='none');ovh&&(ovh.style.display='none')}
  // Turbo badge
  let tb=$('#fsTurbo');if(state.fsLocal.turboRemaining>0){if(!tb){tb=document.createElement('div');tb.className='turbo-badge';tb.id='fsTurbo';$('#fsTA')?.appendChild(tb)}tb.textContent=`⚡ turbo ×${state.fsLocal.turboRemaining}`}else if(tb)tb.remove();
}
function renderFSRoundDone(){
  const gc=$('#gameContent');const g=state.activeGame;const me=selfOf(state.room.members);const partner=partnerOf(state.room.members);

// ─── end card ─────────────────────────────────────────────
function renderEndCard(){
  const gc=$('#gameContent');const g=state.activeGame;const me=selfOf(state.room.members);const partner=partnerOf(state.room.members);
  let headline='',statHtml='';
  if(g.game_type==='wyr'){
    const s=g.state.scores.same||0,d=g.state.scores.different||0;
    headline=s>d?'mostly<br><span class="mint">same page</span>':d>s?'mostly<br><span class="mint">different</span>':'<span class="mint">tied up</span>';
    statHtml=`<div class="end-stat">same <span class="num">${s}</span></div><div class="end-stat">different <span class="num">${d}</span></div>`;
  }else if(g.game_type==='fs'){
    const ms=g.state.scores[me.user_id]||0,ts=partner?(g.state.scores[partner.user_id]||0):0;
    const iWon=g.state.match_winner===me.user_id;
    headline=iWon?'<span class="mint">you</span><br>smashed it':`<span class="mint">${esc((partner?.display_name||'they').slice(0,12))}</span><br>got the win`;
    statHtml=`<div class="end-stat">${esc(me.display_name)} <span class="num">${ms}</span></div><div class="end-stat">${esc(partner?.display_name||'–')} <span class="num">${ts}</span></div>`;
  }else{
    const ms=g.state.scores[me.user_id]||0,ts=partner?(g.state.scores[partner.user_id]||0):0;
    headline=ms>ts?'<span class="mint">you</span><br>showed up':ts>ms?`<span class="mint">${esc((partner?.display_name||'they').slice(0,12))}</span><br>showed up`:'<span class="mint">dead heat</span>';
    statHtml=`<div class="end-stat">${esc(me.display_name)} <span class="num">${ms}</span></div><div class="end-stat">${esc(partner?.display_name||'–')} <span class="num">${ts}</span></div>`;
    if(g.state.stake)statHtml+=`<div class="stake-banner" style="margin-top:12px">🏆 ${esc(g.state.stake)}</div>`;
  }
  gc.innerHTML=`<div class="game-screen"><div class="end-card">
    <div class="end-headline">${headline}</div>
    ${statHtml}
    <div class="end-actions">
      <button class="btn-primary" id="playAgain">play again <span class="arrow">→</span></button>
      <button class="btn-ghost" id="backLobby">back to room</button>
    </div>
  </div></div>`;
  [$('#myBlob'),$('#themBlob')].forEach(b=>{if(b){b.classList.add('pulsing');setTimeout(()=>b.classList.remove('pulsing'),800)}});
  $('#playAgain').addEventListener('click',()=>{teardownFS();const defs={wyr:7,tod:6,fs:1};startGame(g.game_type,g.state.total_rounds||defs[g.game_type])});
  $('#backLobby').addEventListener('click',()=>{teardownFS();state.activeGame=null;closeOverlay();renderLobby()});
}
async function confirmEndGame(){
  if(!confirm('leave this game?'))return;
  const g=state.activeGame;
  if(g)await sb.from('game_sessions').update({ended_at:new Date().toISOString(),phase:'abandoned'}).eq('id',g.id);
  teardownFS();state.activeGame=null;closeOverlay();renderLobby();const v=$('#todVig');if(v)v.remove();
}

$('#myBlob').addEventListener('click',()=>{if(!state.profile)return;$('#nameEditModal').hidden=false;$('#nameEditInput').value=state.profile.display_name||'';setTimeout(()=>$('#nameEditInput').focus(),50)});
$('#nameEditCancel').addEventListener('click',()=>$('#nameEditModal').hidden=true);
$('#nameEditModal').addEventListener('click',e=>{if(e.target.id==='nameEditModal')$('#nameEditModal').hidden=true});
$('#nameEditSave').addEventListener('click',async()=>{
  const name=$('#nameEditInput').value.trim();if(!name){toast('need a name');return}
  if(name===state.profile.display_name){$('#nameEditModal').hidden=true;return}
  const btn=$('#nameEditSave');btn.disabled=true;
  try{const{data,error}=await sb.from('profiles').update({display_name:name}).eq('id',state.user.id).select().single();if(error)throw error;
    state.profile=data;if(state.room?.members)state.room.members=state.room.members.map(m=>m.user_id===state.user.id?{...m,display_name:name}:m);
    $('#nameEditModal').hidden=true;renderRoomBar();toast('name updated');
  }catch(e){toast('could not save',true)}finally{btn.disabled=false}
});
$('#nameEditInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('#nameEditSave').click();if(e.key==='Escape')$('#nameEditModal').hidden=true});

// ─── routing ──────────────────────────────────────────────
window.addEventListener('hashchange',handleHash);
async function handleHash(){
  const m=window.location.hash.match(/^#\/r\/([A-Z]{4})$/i);
  if(!m){if(state.room){state.room=null;state.activeGame=null;stopPolling();stopKeepAlive();teardownFS();unsubscribeAll();closeOverlay()}renderRecentRooms();show('screen-home');return}
  const code=m[1].toUpperCase();
  let{data:{user}}=await sb.auth.getUser();
  if(!user){try{const{data:r}=await sb.auth.refreshSession();if(r?.user)user=r.user}catch(e){}}
  if(!user){slots.forEach((s,i)=>{s.value=code[i]||'';if(s.value)s.classList.add('filled')});show('screen-home');return}
  state.user=user;
  const mem=getRememberedRoom(code);
  if(mem&&mem.userId===user.id){
    const{data:prof}=await sb.from('profiles').select('*').eq('id',user.id).maybeSingle();
    if(prof){state.profile=prof;show('screen-room');$('#hubBody').innerHTML='<div class="loading">reconnecting</div>';await loadRoom(code);return}
  }
  const{data:prof}=await sb.from('profiles').select('*').eq('id',user.id).maybeSingle();
  if(!prof){state.pendingAction={type:'join',code};goToNameScreen();return}
  state.profile=prof;
  const{data:room}=await sb.from('rooms').select('id,code').eq('code',code).maybeSingle();
  if(!room){goHome();return}
  const{data:existing}=await sb.from('room_members').select('user_id').eq('room_id',room.id).eq('user_id',user.id).maybeSingle();
  if(existing){show('screen-room');$('#hubBody').innerHTML='<div class="loading">loading</div>';await loadRoom(code)}
  else{state.pendingAction={type:'join',code};await joinRoom(code)}
}

// ─── init ─────────────────────────────────────────────────
(async()=>{
  const{data:{user}}=await sb.auth.getUser();
  if(user){state.user=user;const{data:prof}=await sb.from('profiles').select('*').eq('id',user.id).maybeSingle();if(prof)state.profile=prof}
  renderRecentRooms();handleHash();
})();
</script>

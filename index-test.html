<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clove | Hub</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            /* Your Botanical & Modern Palette */
            --bg-slate: #0F172A;
            --bg-slate-light: #1E293B;
            --mint: #A7F3D0;
            --mint-glow: rgba(167, 243, 208, 0.4);
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            
            /* AAA Physics Curves */
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --focus-curve: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-slate);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Prevent web scrolling, make it feel native */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- THE SPATIAL ARCHITECTURE --- */
        
        #app-container {
            width: 100%;
            height: 100%;
            position: relative;
            transition: filter 1.2s var(--focus-curve), transform 1.2s var(--focus-curve);
        }

        /* The Masking Class (Applied when connecting/reconnecting) */
        #app-container.system-waking {
            filter: blur(12px) brightness(0.7);
            transform: scale(0.98);
            pointer-events: none;
        }

        /* The Persistent Hub Layer */
        #hub-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .status-badge {
            position: absolute;
            top: 40px;
            padding: 8px 16px;
            background: var(--bg-slate-light);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background-color: var(--text-muted);
            transition: background-color 0.3s ease;
        }
        
        .status-dot.online { background-color: var(--mint); box-shadow: 0 0 10px var(--mint-glow); }
        .status-dot.offline { background-color: #EF4444; }

        /* Generative Avatar Blob (Acts as the Game Start Button) */
        .avatar-blob {
            width: 120px; height: 120px;
            background: radial-gradient(circle at 30% 30%, var(--mint), #34D399);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: breathe 8s ease-in-out infinite alternate;
            box-shadow: 0 0 40px var(--mint-glow);
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .avatar-blob:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        @keyframes breathe {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: translateY(0); }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: translateY(-15px); }
        }

        /* --- THE GAME OVERLAY & PHYSICS --- */

        #game-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-slate);
            z-index: 20;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.6s var(--spring), opacity 0.4s ease;
        }

        #game-overlay.active {
            transform: translateY(0);
            opacity: 1;
            pointer-events: all;
        }

        #fs-arena {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .tap-zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            touch-action: none; /* Prevent browser scrolling while tapping */
        }

        #opponent-zone { background-color: var(--bg-slate-light); transform: rotate(180deg); }
        #my-zone { background-color: var(--bg-slate); cursor: pointer; }

        .score-display {
            font-size: 80px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.1);
            transition: color 0.1s;
            user-select: none;
        }

        .instruction {
            position: absolute;
            bottom: 40px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--mint);
            opacity: 0.5;
            user-select: none;
        }

        /* The Tension String */
        #tension-line {
            position: absolute;
            top: 50%;
            left: 0; right: 0;
            height: 4px;
            background-color: var(--mint);
            box-shadow: 0 0 15px var(--mint-glow);
            transform: translateY(-50%);
            transition: transform 0.1s linear, border-radius 0.1s linear, height 0.1s linear;
            z-index: 30;
            pointer-events: none;
        }

        #close-game-btn {
            position: absolute;
            right: 20px; top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--text-muted);
            border: none;
            font-size: 14px;
            z-index: 40;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div id="app-container" class="system-waking">
        
        <div id="hub-layer">
            <div class="status-badge">
                <div id="connection-dot" class="status-dot"></div>
                <span id="connection-text">Syncing...</span>
            </div>

            <div class="avatar-blob" id="start-btn"></div>
            
            <h2 style="margin-top: 40px; font-weight: 400;">The Flatmates Hub</h2>
            <p style="color: var(--text-muted); margin-top: 8px;">Tap the core to start Finger Smash</p>
        </div>

        <div id="game-overlay">
            <div id="fs-arena">
                <div id="opponent-zone" class="tap-zone">
                    <span class="score-display" id="opponent-score">0</span>
                </div>
                
                <div id="tension-line"></div>
                
                <div id="my-zone" class="tap-zone">
                    <span class="score-display" id="my-score">0</span>
                    <p class="instruction">TAP RAPIDLY</p>
                </div>
            </div>
            
            <button id="close-game-btn" onclick="endGame()">End Match</button>
        </div>

    </div>

    <script>
        // --- 1. SUPABASE INITIALIZATION --- //
        
        // REPLACE THESE WITH YOUR ACTUAL KEYS
        const SUPABASE_URL = 'https://zfbahckiiytuebejahia.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_qQfnibwTWXmjqJalCiurEg_ayJHALxH';
        
        // Only initialize if keys are present (prevents crash on local testing)
        let supabase = null;
        if(SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
             supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        // --- 2. GLOBAL STATE --- //
        const state = {
            threadId: 'test-thread-001', 
            channel: null,
            gameActive: false,
            myScore: 0,
            opponentScore: 0
        };

        // UI References
        const appContainer = document.getElementById('app-container');
        const connDot = document.getElementById('connection-dot');
        const connText = document.getElementById('connection-text');
        
        // --- 3. LIFECYCLE & CONNECTION MANAGER --- //
        
        function connectToHub() {
            if (!supabase) {
                console.warn("No Supabase keys found. Running in Local Offline Mode.");
                connText.innerText = "Offline Mode";
                connDot.className = "status-dot online";
                appContainer.classList.remove('system-waking');
                return;
            }

            console.log("Initiating connection to thread:", state.threadId);
            connText.innerText = "Syncing...";
            connDot.className = "status-dot"; 

            state.channel = supabase.channel(`thread:${state.threadId}`);

            // Listen for opponent taps
            state.channel.on('broadcast', { event: 'fs_tap' }, (payload) => {
                state.opponentScore = payload.payload.score;
                document.getElementById('opponent-score').innerText = state.opponentScore;
                updatePhysics();
            });

            // Subscribing handles the UI masking
            state.channel.subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    console.log("Connected. Dropping the mask.");
                    connText.innerText = "Connected";
                    connDot.className = "status-dot online";
                    appContainer.classList.remove('system-waking');
                }
                if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
                    connText.innerText = "Offline";
                    connDot.className = "status-dot offline";
                }
            });
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                console.log("App minimized. Severing WebSocket.");
                if (state.channel && supabase) supabase.removeAllChannels();
                appContainer.classList.add('system-waking');
                connText.innerText = "Suspended";
                connDot.className = "status-dot";
            } else if (document.visibilityState === 'visible') {
                console.log("App visible. Reconnecting.");
                connectToHub();
            }
        });

        // Delay first boot slightly for visual effect
        setTimeout(connectToHub, 500);

        // --- 4. GAME ENGINE (FINGER SMASH) --- //

        const gameOverlay = document.getElementById('game-overlay');
        const tensionLine = document.getElementById('tension-line');
        const myZone = document.getElementById('my-zone');
        const myScoreEl = document.getElementById('my-score');
        const opponentScoreEl = document.getElementById('opponent-score');

        // Start Game
        document.getElementById('start-btn').addEventListener('click', () => {
            state.gameActive = true;
            state.myScore = 0;
            state.opponentScore = 0;
            myScoreEl.innerText = '0';
            opponentScoreEl.innerText = '0';
            updatePhysics();
            
            gameOverlay.classList.add('active');
            appContainer.style.transform = 'scale(0.95)'; // Depth effect
        });

        // End Game
        window.endGame = function() {
            state.gameActive = false;
            gameOverlay.classList.remove('active');
            appContainer.style.transform = 'scale(1)';
            console.log(`Match Ended. ${state.myScore} - ${state.opponentScore}`);
        };

        // Tap Logic (Pointerdown for speed/weight)
        myZone.addEventListener('pointerdown', (e) => {
            if (!state.gameActive) return;
            
            state.myScore++;
            myScoreEl.innerText = state.myScore;
            
            // Flash effect
            myScoreEl.style.color = 'rgba(255,255,255,0.8)';
            setTimeout(() => myScoreEl.style.color = 'rgba(255,255,255,0.1)', 100);

            if (state.channel && state.channel.state === 'joined') {
                state.channel.send({
                    type: 'broadcast',
                    event: 'fs_tap',
                    payload: { score: state.myScore }
                });
            }
            
            updatePhysics();
        });

        // Tension String Math
        function updatePhysics() {
            const totalTaps = state.myScore + state.opponentScore;
            if (totalTaps === 0) {
                tensionLine.style.transform = `translateY(-50%)`;
                tensionLine.style.borderRadius = `0px`;
                return;
            }

            const ratio = state.myScore / totalTaps;
            const offset = (ratio - 0.5) * -300; 
            const stretch = Math.abs(ratio - 0.5) * 100;
            
            tensionLine.style.transform = `translateY(calc(-50% + ${offset}px))`;
            
            if (ratio > 0.5) {
                tensionLine.style.borderRadius = `50% 50% 0 0 / ${stretch}px ${stretch}px 0 0`;
                tensionLine.style.height = `${Math.max(1, 4 - (stretch/20))}px`;
            } else {
                tensionLine.style.borderRadius = `0 0 50% 50% / 0 0 ${stretch}px ${stretch}px`;
                tensionLine.style.height = `${Math.max(1, 4 - (stretch/20))}px`;
            }
        }
    </script>
</body>
</html>
